<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    
    <title>UPPL QC Word Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Word File Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { min-width: 250px; padding: 16px; border-radius: 8px; color: white; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); opacity: 0; transform: translateY(-20px); transition: all 0.3s ease; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: #10B981; }
        .toast.error { background-color: #EF4444; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-20">

    <div id="toast-container"></div>

    <div class="bg-blue-900 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex">
            <button id="tabScanBtn" onclick="switchTab('scan')" class="flex-1 py-4 font-bold text-center transition bg-blue-700 text-white border-b-4 border-yellow-400">
                📝 Word Generator (NextGen)
            </button>
            <button id="tabWorkbookBtn" onclick="switchTab('workbook')" class="flex-1 py-4 font-bold text-center transition text-blue-300 hover:bg-blue-800">
                📚 History
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto mt-6 px-4">
        
        <!-- SCAN TAB -->
        <div id="scanTab" class="block">
            <div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-600">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">1. Scanner Setup (Tier-1)</h2>

                <!-- SECURE API KEY BOX -->
                <div class="bg-green-50 p-4 rounded-lg border border-green-300 mb-6 shadow-sm">
                    <label class="block text-sm font-bold text-green-900 mb-1">🔑 Tier-1 Verified API Key</label>
                    <input type="password" id="apiKey" placeholder="Apni Nayi AIzaSy... key yahan dalein" class="w-full text-sm bg-white p-2 border rounded font-mono text-gray-800 mb-3">
                    
                    <label class="block text-xs font-bold text-gray-700 mb-1">AI Model:</label>
                    <select id="aiModel" class="w-full p-2 border rounded font-bold text-sm text-blue-900 bg-white">
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash (Fastest)</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash (Newest)</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro (Extreme Detail)</option>
                    </select>
                </div>

                <!-- Template Uploader -->
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-300 mb-6 shadow-sm">
                    <label class="block text-sm font-bold text-blue-900 mb-1">🗃️ Upload Inner Template (.docx)</label>
                    <input type="file" id="templateInner" accept=".docx" onchange="loadTemplate(event, 'Inner')" class="w-full text-sm bg-white p-2 border rounded">
                    <p id="statusInner" class="text-xs text-red-500 font-bold mt-1">Template Missing</p>
                </div>

                <div class="border-2 border-dashed border-blue-300 rounded-xl p-6 bg-gray-50 text-center mb-6">
                    <label class="block text-sm font-bold text-gray-800 mb-2">📸 Upload GRN Photo</label>
                    <input type="file" id="grnImage" accept="image/*" onchange="handleImageUpload(event)" class="max-w-xs mx-auto text-sm bg-white p-2 border rounded block">
                    <img id="imagePreview" class="mt-4 max-h-40 mx-auto border shadow-lg rounded hidden">
                </div>

                <button id="processBtn" onclick="processImage()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 text-lg transition-transform active:scale-95">
                    🤖 Scan Photo
                </button>

                <div id="loadingText" class="text-center font-bold text-blue-600 mt-4 hidden animate-pulse text-sm">
                    AI photo padh raha hai... Rukein.
                </div>

                <!-- RESULTS SECTION -->
                <div id="resultSection" class="mt-8 border-t-2 pt-6 hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-green-700">Step 2: Check & Edit ⬇️</h3>
                        <button onclick="addManualRow()" class="bg-gray-800 text-white text-xs px-3 py-2 rounded shadow hover:bg-gray-700">+ Row</button>
                    </div>

                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-300 mb-6 shadow-sm">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="col-span-2 md:col-span-4">
                                <label class="block text-xs font-bold text-gray-600">Supplier Name</label>
                                <input type="text" id="inpSupplier" class="w-full p-2 border rounded font-bold text-sm bg-white" onchange="syncCommonData()">
                            </div>
                            <div><label class="block text-xs font-bold text-gray-500">GRN No.</label><input type="text" id="inpGrn" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                            <div><label class="block text-xs font-bold text-gray-500">D.C. No</label><input type="text" id="inpDcNo" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                            <div><label class="block text-xs font-bold text-gray-500">D.C. Date</label><input type="text" id="inpDcDate" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                            <div><label class="block text-xs font-bold text-gray-500">P.O. No.</label><input type="text" id="inpPoNo" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                            <div><label class="block text-xs font-bold text-gray-500">P.O. Date</label><input type="text" id="inpPoDate" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                            <div class="col-span-2"><label class="block text-xs font-bold text-blue-600">A.R. No.</label><input type="text" id="inpAr" class="w-full p-2 border border-blue-300 rounded font-mono text-sm bg-blue-50" onchange="syncCommonData()"></div>
                            <div class="col-span-2"><label class="block text-xs font-bold text-blue-600">A.R. Date</label><input type="text" id="inpArDate" class="w-full p-2 border border-blue-300 rounded font-mono text-sm bg-blue-50" onchange="syncCommonData()"></div>
                        </div>
                    </div>

                    <div class="overflow-x-auto mb-6 shadow-sm border rounded-lg">
                        <table class="min-w-full bg-white text-sm text-left">
                            <thead class="bg-gray-800 text-white">
                                <tr>
                                    <th class="p-2 w-1/3">Brand Name</th>
                                    <th class="p-2">Batch No</th>
                                    <th class="p-2">Qty</th>
                                    <th class="p-2 text-center">Delete</th>
                                </tr>
                            </thead>
                            <tbody id="batchTableBody"></tbody>
                        </table>
                    </div>

                    <button onclick="downloadWord('Inner')" class="w-full bg-blue-500 text-white text-lg font-bold py-4 rounded-xl shadow hover:bg-blue-600 transition mb-4">
                        📥 Download Word File
                    </button>
                    
                    <button onclick="saveToDatabase()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow hover:bg-green-700 transition">
                        💾 Save to History
                    </button>
                </div>
            </div>
        </div>

        <!-- HISTORY TAB -->
        <div id="workbookTab" class="hidden">
            <div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-green-500">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">History Log</h2>
                <div id="workbookContainer" class="space-y-4">
                    <div class="text-center py-10 text-gray-500">History loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnt87woppTbR8b1d9cCaqFTQOptf2YGAA",
            authDomain: "salary-tracker-768a9.firebaseapp.com",
            projectId: "salary-tracker-768a9",
            storageBucket: "salary-tracker-768a9.firebasestorage.app",
            messagingSenderId: "533403739591",
            appId: "1:533403739591:web:ceba8d71751b1963fd25e2"
        };

        let app, auth, db, user;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            signInAnonymously(auth);
            onAuthStateChanged(auth, (u) => { if(u) { user = u; fetchWorkbook(); }});
        } catch(e) { console.error("Firebase error", e); }

        window.templates = { Inner: null };
        window.base64Image = '';
        window.extractedData = null;
        window.historyData = [];

        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('upplSecureGeminiKey');
            if(savedKey) document.getElementById('apiKey').value = savedKey;
        });

        const pmDatabase = {
            "Big Fun": { "Inner": "ITC Cyber XL Board With MET PET, Printing, Embossing, Spot UV, and UV Coating" },
            "Life": { "Inner": "ITC Cyber XL Board With 4 Colour Printing UV Coating" },
            "Max Red": { "Inner": "ITC Cyber XL Board With MET PET, Printing Embossing, Spot UV and UV Coating" },
            "Xplore": { "Inner": "ITC Cyber XL Board With MET PET, Printing Embossing, Spot UV and UV Coating" },
            "Instaplay": { "Inner": "ITC Cyber XL Board With 4 Colour Printing UV Coating" }
        };

        const calculateAQL = (qty) => {
            let s_lvl1 = qty > 500 ? 200 : 80;
            let s_lvl2 = qty > 500 ? 500 : 200;
            return {
                s_s2: 13, ar_s2: "0/1",
                s_lvl1: s_lvl1, ar_lvl1: "5/6",
                s_lvl2: s_lvl2, ar_lvl2: "21/22"
            };
        };

        const generateGSMMath = () => {
            let total = 0;
            for(let i=1; i<=9; i++) total += 253 + Math.random()*2;
            return { avg_gsm: (total / 9).toFixed(1) };
        };

        window.showToast = function(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        window.switchTab = function(tabName) {
            document.getElementById('scanTab').classList.toggle('hidden', tabName !== 'scan');
            document.getElementById('workbookTab').classList.toggle('hidden', tabName !== 'workbook');
        }

        window.loadTemplate = function(e, type) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                window.templates[type] = evt.target.result;
                document.getElementById(`status${type}`).innerText = "✓ Template Ready";
                document.getElementById(`status${type}`).className = "text-xs text-green-600 font-bold mt-1";
            };
            reader.readAsArrayBuffer(file);
        }

        window.handleImageUpload = function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                document.getElementById('imagePreview').src = evt.target.result;
                document.getElementById('imagePreview').classList.remove('hidden');
                window.base64Image = evt.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }

        window.processImage = async function() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const modelName = document.getElementById('aiModel').value;
            if (!apiKey) return alert("❌ API Key dalein!");
            if (!window.base64Image) return showToast("Pehle photo upload karein!", "error");
            
            localStorage.setItem('upplSecureGeminiKey', apiKey);
            const btn = document.getElementById('processBtn');
            const loadingText = document.getElementById('loadingText');
            btn.innerText = "⏳ Scanning...";
            btn.disabled = true;
            loadingText.classList.remove('hidden');

            try {
                const prompt = `Analyze this GRN image. Extract ALL rows from the description table. 
                Dates: "poDate" (near P.O. No), "arDate" (near A.R. No). 
                JSON strictly: { "supplierName": "", "grnNo": "", "poNo": "", "poDate": "", "dcNo": "", "dcDate": "", "arNo": "", "arDate": "", "batches": [ { "brandName": "", "batchNo": "", "receivedQty": "" } ] }`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: window.base64Image } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if(!res.ok) throw new Error(await res.text());
                const data = await res.json();
                const info = JSON.parse(data.candidates[0].content.parts[0].text);

                window.extractedData = {
                    ...info,
                    batches: info.batches.map(b => ({
                        brand: b.brandName, batch: b.batchNo, qty: parseInt(b.receivedQty) || 0,
                        spec: "ITC Cyber XL Board With 4 Colour Printing UV Coating",
                        ...calculateAQL(parseInt(b.receivedQty) || 0), ...generateGSMMath()
                    }))
                };

                updateFormUI();
                document.getElementById('resultSection').classList.remove('hidden');
                showToast("Scanning Successful!", "success");
            } catch (e) {
                alert("❌ SCAN ERROR: " + e.message);
            } finally {
                btn.innerText = "🤖 Scan Photo";
                btn.disabled = false;
                loadingText.classList.add('hidden');
            }
        };

        window.syncCommonData = function() {
            if(!window.extractedData) return;
            window.extractedData.supplierName = document.getElementById('inpSupplier').value;
            window.extractedData.grnNo = document.getElementById('inpGrn').value;
            window.extractedData.arNo = document.getElementById('inpAr').value;
            window.extractedData.arDate = document.getElementById('inpArDate').value;
            window.extractedData.dcNo = document.getElementById('inpDcNo').value;
            window.extractedData.dcDate = document.getElementById('inpDcDate').value;
            window.extractedData.poNo = document.getElementById('inpPoNo').value;
            window.extractedData.poDate = document.getElementById('inpPoDate').value;
        };

        function updateFormUI() {
            const d = window.extractedData;
            document.getElementById('inpSupplier').value = d.supplierName;
            document.getElementById('inpGrn').value = d.grnNo;
            document.getElementById('inpAr').value = d.arNo;
            document.getElementById('inpArDate').value = d.arDate;
            document.getElementById('inpDcNo').value = d.dcNo;
            document.getElementById('inpDcDate').value = d.dcDate;
            document.getElementById('inpPoNo').value = d.poNo;
            document.getElementById('inpPoDate').value = d.poDate;
            renderBatchTable();
        }

        window.addManualRow = function() {
            window.extractedData.batches.push({ brand: "Edit Me", batch: "LF00/25", qty: 1000, spec: "Standard Spec", ...calculateAQL(1000), ...generateGSMMath() });
            renderBatchTable();
        }

        function renderBatchTable() {
            const tbody = document.getElementById('batchTableBody');
            tbody.innerHTML = '';
            window.extractedData.batches.forEach((b, i) => {
                tbody.innerHTML += `<tr class="border-b">
                    <td class="p-1"><input type="text" value="${b.brand}" onchange="updateBatch(${i}, 'brand', this.value)" class="w-full border p-1 text-xs"></td>
                    <td class="p-1"><input type="text" value="${b.batch}" onchange="updateBatch(${i}, 'batch', this.value)" class="w-full border p-1 text-xs font-mono"></td>
                    <td class="p-1"><input type="number" value="${b.qty}" onchange="updateBatch(${i}, 'qty', this.value)" class="w-full border p-1 text-xs w-16"></td>
                    <td class="p-1 text-center"><button onclick="removeBatch(${i})">🗑️</button></td>
                </tr>`;
            });
        }

        window.updateBatch = function(i, k, v) { window.extractedData.batches[i][k] = v; }
        window.removeBatch = function(i) { window.extractedData.batches.splice(i,1); renderBatchTable(); }

        window.downloadWord = function(cat) {
            syncCommonData();
            if(!window.templates[cat]) return alert("Pehle Word Template upload karein!");
            try {
                const zip = new PizZip(window.templates[cat]);
                const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                const finalBatches = window.extractedData.batches.map(b => ({
                    ...b, supplier: window.extractedData.supplierName, grn: window.extractedData.grnNo,
                    ar_no: window.extractedData.arNo, ar_date: window.extractedData.arDate,
                    dc_no: window.extractedData.dcNo, dc_date: window.extractedData.dcDate,
                    po_no: window.extractedData.poNo, po_date: window.extractedData.poDate
                }));
                doc.render({ batches: finalBatches });
                const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                saveAs(out, `QC_Report_${window.extractedData.grnNo.replace(/\//g,'-')}.docx`);
            } catch(e) {
                alert("🚨 WORD TEMPLATE ERROR 🚨\nSahi .docx format use karein aur Page Break check karein.");
            }
        }

        window.saveToDatabase = async function() {
            if(!user || !window.extractedData) return;
            try {
                await addDoc(collection(db, 'users', user.uid, 'qc_word_history'), {
                    timestamp: Date.now(), grnNo: window.extractedData.grnNo, batches: window.extractedData.batches
                });
                showToast("Saved!", "success");
            } catch(e) {}
        }

        function fetchWorkbook() {
            if (!user) return;
            onSnapshot(collection(db, 'users', user.uid, 'qc_word_history'), (snap) => {
                const container = document.getElementById('workbookContainer');
                container.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    container.innerHTML += `<div class="p-3 border rounded mb-2 bg-gray-50 font-bold text-xs">GRN: ${data.grnNo} (${data.batches.length} Items)</div>`;
                });
            });
        }
    </script>
</body>
</html>
