<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>UPPL QC Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Word Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { min-width: 250px; padding: 16px; border-radius: 8px; color: white; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); opacity: 0; transform: translateY(-20px); transition: all 0.3s ease; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: #10B981; }
        .toast.error { background-color: #EF4444; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans pb-20">

    <div id="toast-container"></div>

    <div class="bg-indigo-900 shadow-xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab('scan')" id="tabScanBtn" class="flex-1 py-4 font-bold text-center transition bg-indigo-700 text-white border-b-4 border-yellow-400">
                📝 QC Report Generator
            </button>
            <button onclick="switchTab('history')" id="tabHistoryBtn" class="flex-1 py-4 font-bold text-center transition text-indigo-300 hover:bg-indigo-800">
                📚 Calculations History
            </button>
        </div>
    </div>

    <div class="max-w-3xl mx-auto mt-6 px-4">
        
        <div id="scanTab">
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-slate-200">
                <h2 class="text-xl font-extrabold text-slate-800 mb-6 border-b pb-3">1. Configuration & Scan</h2>

                <!-- API KEY SECTION -->
                <div class="bg-amber-50 p-4 rounded-xl border border-amber-200 mb-6 shadow-sm">
                    <label class="block text-xs font-bold text-amber-900 uppercase tracking-wider mb-2">🔑 Tier-1 API Key (VIP Mode)</label>
                    <input type="password" id="apiKey" placeholder="AIzaSy... wali Verified key yahan dalein" class="w-full p-3 border border-amber-300 rounded-lg font-mono text-sm focus:ring-2 focus:ring-amber-400 outline-none">
                </div>

                <!-- TEMPLATE UPLOAD -->
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 mb-6">
                    <label class="block text-xs font-bold text-blue-900 uppercase tracking-wider mb-2">🗃️ Upload Word Template (.docx)</label>
                    <input type="file" id="templateInput" accept=".docx" onchange="loadTemplate(event)" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                    <p id="templateStatus" class="text-xs text-rose-500 font-bold mt-2">File missing. Please upload!</p>
                </div>

                <!-- GRN PHOTO -->
                <div class="border-2 border-dashed border-slate-300 rounded-2xl p-8 bg-slate-50 text-center mb-6 transition-colors hover:border-indigo-400">
                    <label class="block text-sm font-bold text-slate-700 mb-3">📸 Select GRN Photo</label>
                    <input type="file" id="grnImage" accept="image/*" onchange="handleImage(event)" class="hidden">
                    <button onclick="document.getElementById('grnImage').click()" class="bg-white border border-slate-300 px-6 py-2 rounded-full text-sm font-bold shadow-sm hover:bg-slate-100">Browse Image</button>
                    <img id="previewImg" class="mt-4 max-h-48 mx-auto rounded-lg shadow-md border hidden">
                </div>

                <button id="scanBtn" onclick="processScan()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 text-lg transition-all active:scale-95 disabled:bg-slate-400">
                    🤖 SCAN HANDWRITTEN GRN
                </button>

                <div id="loaderUI" class="hidden text-center mt-6">
                    <div class="inline-block w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full spin mb-2"></div>
                    <p class="text-indigo-600 font-bold text-sm">AI is extracting 5 batches... Please wait 10-15s</p>
                </div>

                <!-- EDIT SECTION -->
                <div id="resultsUI" class="mt-10 border-t-2 pt-8 hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-green-700 underline underline-offset-4">Step 2: Verify & Edit Data</h3>
                        <button onclick="addBatchRow()" class="bg-slate-800 text-white text-xs px-4 py-2 rounded-lg shadow">+ Manual Batch</button>
                    </div>

                    <!-- Common Data -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-5 rounded-2xl border border-slate-200 mb-8 shadow-inner">
                        <div class="col-span-2 md:col-span-4">
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Supplier</label>
                            <input type="text" id="inp_supplier" class="w-full p-2 border rounded bg-white font-bold text-sm">
                        </div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">GRN No</label><input type="text" id="inp_grn" class="w-full p-2 border rounded bg-white text-sm"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">DC No</label><input type="text" id="inp_dc" class="w-full p-2 border rounded bg-white text-sm"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">DC Date</label><input type="text" id="inp_dc_date" class="w-full p-2 border rounded bg-white text-sm"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">PO No</label><input type="text" id="inp_po" class="w-full p-2 border rounded bg-white text-sm"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">PO Date</label><input type="text" id="inp_po_date" class="w-full p-2 border rounded bg-white text-sm"></div>
                        <div class="col-span-2"><label class="text-[10px] font-bold text-indigo-600 uppercase">AR No / Date</label>
                            <div class="flex gap-1"><input type="text" id="inp_ar" class="w-1/2 p-2 border rounded bg-indigo-50 text-sm font-bold"><input type="text" id="inp_ar_date" class="w-1/2 p-2 border rounded bg-indigo-50 text-sm"></div>
                        </div>
                    </div>

                    <!-- Batches Table -->
                    <div class="overflow-hidden border rounded-xl mb-8 shadow-sm">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-800 text-white">
                                <tr>
                                    <th class="p-3 text-left">Brand</th>
                                    <th class="p-3 text-left">Batch</th>
                                    <th class="p-3 text-left">Qty</th>
                                    <th class="p-3 text-center">Del</th>
                                </tr>
                            </thead>
                            <tbody id="batchList"></tbody>
                        </table>
                    </div>

                    <button onclick="downloadWord()" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-green-100 hover:bg-green-700 text-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                        💾 DOWNLOAD WORD REPORT
                    </button>
                    <p class="text-center text-[10px] text-slate-400 mt-3">*All 5 batches will be in a single Word file.</p>
                </div>
            </div>
        </div>

        <div id="historyTab" class="hidden">
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-slate-200">
                <h2 class="text-xl font-extrabold text-slate-800 mb-6 border-b pb-3">Past Calculations</h2>
                <div id="historyList" class="space-y-3">
                    <div class="text-center py-12 text-slate-400 italic">No history found.</div>
                </div>
            </div>
        </div>

    </div>

    <!-- MAIN APP SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyAnt87woppTbR8b1d9cCaqFTQOptf2YGAA",
            authDomain: "salary-tracker-768a9.firebaseapp.com",
            projectId: "salary-tracker-768a9",
            storageBucket: "salary-tracker-768a9.firebasestorage.app",
            messagingSenderId: "533403739591",
            appId: "1:533403739591:web:ceba8d71751b1963fd25e2"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        signInAnonymously(auth);
        onAuthStateChanged(auth, (u) => { if(u) { currentUser = u; fetchHistory(); }});

        // Global State
        window.templateData = null;
        window.scanData = null;
        window.base64Img = '';

        // Toast Helper
        window.showToast = (msg, type='success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type} show`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        // Tabs
        window.switchTab = (target) => {
            document.getElementById('scanTab').classList.toggle('hidden', target !== 'scan');
            document.getElementById('historyTab').classList.toggle('hidden', target !== 'history');
            document.getElementById('tabScanBtn').className = target === 'scan' ? "flex-1 py-4 font-bold text-center transition bg-indigo-700 text-white border-b-4 border-yellow-400" : "flex-1 py-4 font-bold text-center transition text-indigo-300 hover:bg-indigo-800";
            document.getElementById('tabHistoryBtn').className = target === 'history' ? "flex-1 py-4 font-bold text-center transition bg-indigo-700 text-white border-b-4 border-yellow-400" : "flex-1 py-4 font-bold text-center transition text-indigo-300 hover:bg-indigo-800";
        };

        // Template Loader
        window.loadTemplate = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                window.templateData = evt.target.result;
                const status = document.getElementById('templateStatus');
                status.innerText = "✅ Template Ready: " + file.name;
                status.className = "text-xs text-green-600 font-bold mt-2";
            };
            reader.readAsArrayBuffer(file);
        };

        // Image Handler
        window.handleImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                document.getElementById('previewImg').src = evt.target.result;
                document.getElementById('previewImg').classList.remove('hidden');
                window.base64Img = evt.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        };

        // Batch Math & AQL Logic
        const getAQLData = (qty) => {
            return {
                s_s2: 13, ar_s2: "0/1",
                s_lvl1: qty > 500 ? 200 : 80, ar_lvl1: "5/6",
                s_lvl2: qty > 500 ? 500 : 200, ar_lvl2: "21/22"
            };
        };

        const getGSM = () => (253.5 + Math.random()*2).toFixed(1);

        // AI Processor
        window.processScan = async function() {
            const key = document.getElementById('apiKey').value.trim();
            if (!key) return alert("❌ Pehle API Key dalein!");
            if (!window.base64Img) return showToast("Photo select karein!", "error");

            localStorage.setItem('upplSecureGeminiKey', key);
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('loaderUI').classList.remove('hidden');

            try {
                const prompt = `Analyze this GRN image. Extract ALL items from the table. 
                Dates: Look for handwritten dates near P.O. No and A.R. No.
                Brand: Life 3s Inner (Jasmine/Strawberry/etc).
                JSON strictly: { 
                  "supplier": "", "grn": "", "po": "", "po_date": "", "dc": "", "dc_date": "", "ar": "", "ar_date": "", 
                  "items": [ { "name": "", "batch": "", "qty": "" } ] 
                }`;

                // Using Stable 1.5 Flash for Tier-1
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: window.base64Img } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error.message);
                }

                const resData = await response.json();
                const raw = JSON.parse(resData.candidates[0].content.parts[0].text);

                window.scanData = {
                    supplier: raw.supplier, grn: raw.grn, dc: raw.dc, dc_date: raw.dc_date,
                    po: raw.po, po_date: raw.po_date, ar: raw.ar, ar_date: raw.ar_date,
                    batches: raw.items.map(i => ({
                        brand: i.name, batch: i.batch, qty: parseInt(i.qty) || 0,
                        spec: "ITC Cyber XL Board With 4 Colour Printing UV Coating",
                        avg_gsm: getGSM(), ...getAQLData(parseInt(i.qty) || 0)
                    }))
                };

                renderScanUI();
                document.getElementById('resultsUI').classList.remove('hidden');
                showToast("AI Scan successful!");
            } catch (e) {
                alert("❌ AI SCAN FAILED:\n" + e.message);
            } finally {
                document.getElementById('scanBtn').disabled = false;
                document.getElementById('loaderUI').classList.add('hidden');
            }
        };

        function renderScanUI() {
            const d = window.scanData;
            document.getElementById('inp_supplier').value = d.supplier;
            document.getElementById('inp_grn').value = d.grn;
            document.getElementById('inp_dc').value = d.dc;
            document.getElementById('inp_dc_date').value = d.dc_date;
            document.getElementById('inp_po').value = d.po;
            document.getElementById('inp_po_date').value = d.po_date;
            document.getElementById('inp_ar').value = d.ar;
            document.getElementById('inp_ar_date').value = d.ar_date;
            renderBatchTable();
        }

        window.addBatchRow = () => {
            window.scanData.batches.push({ brand: "Edit Item", batch: "LF00/25", qty: 1000, spec: "Standard Spec", avg_gsm: getGSM(), ...getAQLData(1000) });
            renderBatchTable();
        };

        function renderBatchTable() {
            const tbody = document.getElementById('batchList');
            tbody.innerHTML = '';
            window.scanData.batches.forEach((b, i) => {
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-2"><input type="text" value="${b.brand}" onchange="updateRow(${i}, 'brand', this.value)" class="w-full p-1 border rounded text-xs font-bold"></td>
                        <td class="p-2"><input type="text" value="${b.batch}" onchange="updateRow(${i}, 'batch', this.value)" class="w-full p-1 border rounded text-xs font-mono"></td>
                        <td class="p-2"><input type="number" value="${b.qty}" onchange="updateRow(${i}, 'qty', this.value)" class="w-full p-1 border rounded text-xs w-16"></td>
                        <td class="p-2 text-center"><button onclick="deleteRow(${i})" class="text-rose-500">🗑️</button></td>
                    </tr>
                `;
            });
        }

        window.updateRow = (i, k, v) => { 
            window.scanData.batches[i][k] = v;
            if(k === 'qty') Object.assign(window.scanData.batches[i], getAQLData(parseInt(v)));
        };
        window.deleteRow = (i) => { window.scanData.batches.splice(i,1); renderBatchTable(); };

        window.syncCommonData = () => {
            window.scanData.supplier = document.getElementById('inp_supplier').value;
            window.scanData.grn = document.getElementById('inp_grn').value;
            window.scanData.dc = document.getElementById('inp_dc').value;
            window.scanData.dc_date = document.getElementById('inp_dc_date').value;
            window.scanData.po = document.getElementById('inp_po').value;
            window.scanData.po_date = document.getElementById('inp_po_date').value;
            window.scanData.ar = document.getElementById('inp_ar').value;
            window.scanData.ar_date = document.getElementById('inp_ar_date').value;
        };

        // WORD DOWNLOADER
        window.downloadWord = async function() {
            syncCommonData();
            if (!window.templateData) return alert("❌ Word Template (.docx) upload karein!");
            
            try {
                const zip = new PizZip(window.templateData);
                // Paragraph loop setting is crucial for multi-page
                const docInst = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                const finalData = window.scanData.batches.map(b => ({
                    ...b,
                    supplier: window.scanData.supplier,
                    grn: window.scanData.grn,
                    dc_no: window.scanData.dc,
                    dc_date: window.scanData.dc_date,
                    po_no: window.scanData.po,
                    po_date: window.scanData.po_date,
                    ar_no: window.scanData.ar,
                    ar_date: window.scanData.ar_date
                }));

                docInst.render({ batches: finalData });

                const out = docInst.getZip().generate({ 
                    type: "blob", 
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" 
                });
                
                saveAs(out, `QC_Report_${window.scanData.grn.replace(/\//g,'-')}.docx`);
                showToast("Download Started!");
                saveToHistory();
            } catch (err) {
                console.error(err);
                alert("🚨 WORD FILE ERROR 🚨\n\nAapki file me tags { } galat hain ya file purane Word format me hai. \n\nFIX: Laptop pe Word me khol kar 'Save As -> .docx' karein.");
            }
        };

        async function saveToHistory() {
            if (!currentUser) return;
            try {
                await addDoc(collection(db, 'artifacts', 'uppl-qc-master', 'users', currentUser.uid, 'history'), {
                    timestamp: Date.now(),
                    grn: window.scanData.grn,
                    count: window.scanData.batches.length
                });
            } catch(e) {}
        }

        function fetchHistory() {
            const col = collection(db, 'artifacts', 'uppl-qc-master', 'users', currentUser.uid, 'history');
            onSnapshot(col, (snap) => {
                const container = document.getElementById('historyList');
                container.innerHTML = '';
                snap.forEach(d => {
                    const h = d.data();
                    container.innerHTML += `
                        <div class="p-4 bg-white border rounded-xl shadow-sm flex justify-between items-center">
                            <div><div class="font-bold text-slate-800">GRN: ${h.grn}</div><div class="text-[10px] text-slate-400">${new Date(h.timestamp).toLocaleString()}</div></div>
                            <div class="bg-indigo-100 text-indigo-700 text-xs px-3 py-1 rounded-full font-bold">${h.count} Items</div>
                        </div>
                    `;
                });
            }, (err) => console.log(err));
        }

    </script>
</body>
</html>
