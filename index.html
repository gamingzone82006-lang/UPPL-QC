<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>UPPL QC Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.45.0/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <style>
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { min-width: 250px; padding: 16px; border-radius: 8px; color: white; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); opacity: 0; transform: translateY(-20px); transition: all 0.3s ease; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: #10B981; }
        .toast.error { background-color: #EF4444; }
        
        .chat-ai { background-color: #eff6ff; border-color: #bfdbfe; color: #1e3a8a; border-bottom-left-radius: 0; }
        .chat-user { background-color: #f0fdf4; border-color: #bbf7d0; color: #166534; border-bottom-right-radius: 0; align-self: flex-end; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #3b82f6; border-radius: 50%; animation: typing 1s infinite; margin: 0 2px;}
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        /* Clean UI details hidden styling */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-20 relative">

    <div id="toast-container"></div>

    <div id="userBadge" class="fixed top-4 right-4 bg-gray-900 text-white text-xs font-bold px-3 py-2 rounded-full shadow-lg z-[60] hidden border-2 border-green-400">
        👤 <span id="currentUserEmail">Loading...</span>
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-gray-900 bg-opacity-75 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
            <h2 class="text-2xl font-black text-center text-blue-900 mb-6">UPPL QC LOGIN</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Company ID (Email)</label>
                    <input type="email" id="loginEmail" placeholder="admin@uppl.com" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Password</label>
                    <input type="password" id="loginPass" placeholder="******" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition">
                    Login / Sign Up
                </button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="bg-blue-900 shadow-md sticky top-0 z-50">
            <div class="max-w-4xl mx-auto flex pr-20 md:pr-0">
                <button id="tabScanBtn" onclick="switchTab('scan')" class="flex-1 py-4 font-bold text-center transition bg-blue-700 text-white border-b-4 border-yellow-400 flex items-center justify-center gap-2">
                    📝 QC Scanner
                </button>
                <button id="tabWorkbookBtn" onclick="switchTab('workbook')" class="flex-1 py-4 font-bold text-center transition text-blue-300 hover:bg-blue-800 flex items-center justify-center gap-2">
                    💻 PC View
                </button>
                <button onclick="handleLogout()" class="px-4 py-4 font-bold text-center transition text-red-300 hover:bg-blue-800 text-xs uppercase tracking-wider border-l border-blue-800">
                    Logout
                </button>
            </div>
        </div>

        <div class="max-w-4xl mx-auto mt-6 px-4">
            
            <div id="scanTab" class="block">
                
                <details class="bg-white rounded-xl shadow-sm mb-6 border border-gray-200 overflow-hidden">
                    <summary class="bg-gray-800 text-white font-bold p-4 cursor-pointer flex justify-between items-center hover:bg-gray-700 transition">
                        <span>⚙️ Settings & AI Training (Click to Open)</span>
                        <span class="text-xs bg-gray-600 px-2 py-1 rounded">API, Specs, Templates</span>
                    </summary>
                    <div class="p-6 space-y-6 bg-gray-50">
                        
                        <div class="bg-white p-4 rounded border shadow-sm">
                            <label class="block text-xs font-bold text-gray-600 mb-1">API Key</label>
                            <input type="password" id="apiKey" onchange="saveApiKeyToCloud()" placeholder="AIzaSy..." class="w-full text-sm bg-gray-50 p-2 border rounded font-mono mb-2">
                            <select id="aiModel" class="w-full p-2 border rounded font-bold text-sm text-blue-900 bg-white">
                                <option value="gemini-2.5-flash" selected>⭐ Gemini 2.5 Flash</option>
                                <option value="gemini-2.0-flash">🚀 Gemini 2.0 Flash</option>
                            </select>
                        </div>

                        <div class="bg-purple-50 p-4 rounded border border-purple-200 shadow-sm">
                            <label class="block text-xs font-bold text-purple-800 mb-1">🎭 AI Persona (adi papa)</label>
                            <textarea id="customSystemPrompt" placeholder="Tumhara naam adi papa hai..." class="w-full text-sm bg-white p-2 border rounded h-16"></textarea>
                            <button onclick="savePersonaToCloud()" class="mt-2 text-xs bg-purple-500 text-white px-3 py-1 rounded font-bold">Save Persona</button>
                        </div>

                        <div class="bg-cyan-50 p-4 rounded border border-cyan-200 shadow-sm">
                            <label class="block text-xs font-bold text-cyan-800 mb-1">📋 PM Specification Master List</label>
                            <textarea id="pmSpecList" placeholder="Paste Specs here (Box clears on save)" class="w-full text-sm bg-white p-2 border rounded h-16"></textarea>
                            <button onclick="saveSpecsToCloud()" class="mt-2 text-xs bg-cyan-500 text-white px-3 py-1 rounded font-bold">Save Specs & Clear</button>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-3 border rounded shadow-sm">
                                <label class="block text-[10px] font-bold text-gray-500 mb-1">📦 INNER Template</label>
                                <input type="file" accept=".docx" onchange="loadTemplate(event, 'Inner')" class="w-full text-[10px]">
                                <div id="statusInner" class="text-[10px] text-red-500 font-bold mt-1">Missing</div>
                            </div>
                            <div class="bg-white p-3 border rounded shadow-sm">
                                <label class="block text-[10px] font-bold text-gray-500 mb-1">🗃️ OUTER Template</label>
                                <input type="file" accept=".docx" onchange="loadTemplate(event, 'Outer')" class="w-full text-[10px]">
                                <div id="statusOuter" class="text-[10px] text-red-500 font-bold mt-1">Missing</div>
                            </div>
                        </div>

                    </div>
                </details>

                <div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-600">
                    <div class="border-2 border-dashed border-blue-400 rounded-xl p-8 bg-blue-50 text-center mb-6 cursor-pointer hover:bg-blue-100 transition relative" onclick="document.getElementById('grnImage').click()">
                        <div class="text-4xl mb-2">📸</div>
                        <h3 class="text-lg font-black text-blue-900">Upload GRN Photos</h3>
                        <p class="text-xs text-blue-600 font-bold mt-1">Click here to select multiple pages</p>
                        <input type="file" id="grnImage" accept="image/*" multiple onchange="handleImageUpload(event)" class="hidden">
                    </div>
                    
                    <div id="imagePreviewContainer" class="flex flex-wrap justify-center gap-2 mb-6 hidden"></div>

                    <button id="startChatBtn" onclick="startAIChat()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 text-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                        🤖 Scan with AI Assistant
                    </button>

                    <div id="chatInterface" class="bg-gray-50 border-2 border-blue-300 rounded-xl overflow-hidden mt-6 hidden shadow-lg">
                        <div class="bg-blue-600 text-white font-bold p-3 text-sm flex justify-between items-center shadow">
                            <span class="flex items-center gap-2">💬 QC Assistant</span>
                            <div class="flex gap-2">
                                <button onclick="clearRulesMemory()" class="text-[10px] bg-red-400 hover:bg-red-500 px-2 py-1 rounded shadow">Forget Rules</button>
                                <button onclick="resetChat()" class="text-[10px] bg-gray-800 hover:bg-gray-900 px-2 py-1 rounded shadow">Reset</button>
                            </div>
                        </div>
                        <div id="chatMessages" class="p-4 h-72 overflow-y-auto flex flex-col gap-3"></div>
                        <div class="p-2 bg-white border-t border-blue-200">
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="chatInput" placeholder="Reply karein..." class="flex-1 p-2 border-2 border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500 font-medium" onkeypress="if(event.key === 'Enter') sendUserMessage(false)">
                                <button onclick="sendUserMessage(false)" class="bg-blue-600 text-white px-4 rounded-lg font-black shadow hover:bg-blue-700 text-sm">Send</button>
                            </div>
                            <button onclick="sendUserMessage(true)" class="w-full mt-1 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black py-1.5 rounded shadow text-xs border border-yellow-500">
                                🧠 Train AI (Hamesha yaad rakhega)
                            </button>
                        </div>
                    </div>

                    <div id="resultSection" class="mt-8 border-t-2 border-gray-100 pt-6 hidden">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-black text-gray-800">Verified Data</h3>
                            <button onclick="addManualRow()" class="bg-gray-200 text-gray-800 text-xs px-3 py-1.5 rounded font-bold hover:bg-gray-300 shadow-sm">+ Add Item</button>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-6">
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div class="col-span-2">
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase">Supplier Name</label>
                                    <input type="text" id="inpSupplier" class="w-full p-2 border rounded font-bold text-sm bg-white" onchange="syncCommonData()">
                                </div>
                                <div class="col-span-2">
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase">Approval Number</label>
                                    <input type="text" id="inpApprovalNo" class="w-full p-2 border rounded font-bold text-sm bg-white" placeholder="e.g. 016P" onchange="syncCommonData()">
                                </div>
                                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">GRN No.</label><input type="text" id="inpGrn" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">D.C. No</label><input type="text" id="inpDcNo" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">D.C. Date</label><input type="text" id="inpDcDate" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                            </div>
                        </div>

                        <div id="batchTableBody" class="space-y-4 mb-8">
                            </div>

                        <button onclick="saveToDatabase()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-green-700 transition mb-4 text-lg">
                            🚀 SEND DATA TO PC VIEW
                        </button>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <button onclick="downloadWord('Inner')" class="w-full bg-blue-500 text-white text-sm font-bold py-3 rounded-lg shadow hover:bg-blue-600 transition">
                                📦 Download INNER Word
                            </button>
                            <button onclick="downloadWord('Outer')" class="w-full bg-purple-500 text-white text-sm font-bold py-3 rounded-lg shadow hover:bg-purple-600 transition">
                                🗃️ Download OUTER Word
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="workbookTab" class="hidden">
                <div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-green-500">
                    <h2 class="text-2xl font-black text-gray-800 mb-2 border-b pb-2">💻 PC View (History)</h2>
                    <div id="workbookContainer" class="space-y-4 mt-4">
                        <div class="text-center py-10 text-gray-400 font-bold">Waiting for scans...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnt87woppTbR8b1d9cCaqFTQOptf2YGAA",
            authDomain: "salary-tracker-768a9.firebaseapp.com",
            projectId: "salary-tracker-768a9",
            storageBucket: "salary-tracker-768a9.firebasestorage.app",
            messagingSenderId: "533403739591",
            appId: "1:533403739591:web:ceba8d71751b1963fd25e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let unsubHistory = null;

        // IN-MEMORY DATA
        window.templates = { Inner: null, Outer: null };
        window.base64Images = []; 
        window.extractedData = null;
        window.historyData = [];
        window.expandedGrnId = null;
        
        window.memoryTrainingRules = "";
        window.memorySpecList = "";
        window.customPersona = "";
        window.chatHistory = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userBadge').classList.remove('hidden');
                document.getElementById('currentUserEmail').innerText = user.email;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                showToast("Login Successful! Loading Memory...", "success");
                await loadSettingsFromCloud(); 
                fetchWorkbook(); 
            } else {
                currentUser = null;
                document.getElementById('userBadge').classList.add('hidden');
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                if(unsubHistory) unsubHistory(); 
            }
        });

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if(!email || pass.length < 6) return alert("Email aur 6 char password daalein!");
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, pass);
                        showToast("Account Created!", "success");
                    } catch(e2) { alert("Error: " + e2.message); }
                } else { alert("Login Error: " + err.message); }
            }
        };

        window.handleLogout = () => signOut(auth);

        window.saveApiKeyToCloud = async function() {
            if(!currentUser) return;
            const apiKey = document.getElementById('apiKey').value.trim();
            await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), { apiKey: apiKey, updatedAt: Date.now() }, { merge: true });
        };

        window.savePersonaToCloud = async function() {
            if(!currentUser) return;
            const val = document.getElementById('customSystemPrompt').value.trim();
            window.customPersona = val;
            await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), { customPersona: val }, { merge: true });
            showToast("AI Persona Saved!", "success");
        };

        window.clearRulesMemory = async function() {
            if(!currentUser) return;
            if(confirm("Kya saare AI rules delete karne hain?")) {
                window.memoryTrainingRules = "";
                await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), { aiTrainingRules: "" }, { merge: true });
                showToast("Memory Cleared!", "success");
            }
        };

        window.saveSpecsToCloud = async function() {
            if(!currentUser) return;
            const val = document.getElementById('pmSpecList').value.trim();
            window.memorySpecList = val;
            await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), { pmSpecList: val }, { merge: true });
            document.getElementById('pmSpecList').value = ''; 
            showToast("Specs Saved & Box Cleared!", "success");
        };

        window.saveTemplatesToCloud = async function() {
            if(!currentUser) return;
            await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), {
                innerTemplateBase64: window.templates.Inner || null,
                outerTemplateBase64: window.templates.Outer || null
            }, { merge: true });
        };

        async function loadSettingsFromCloud() {
            if(!currentUser) return;
            try {
                const snap = await getDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'));
                if(snap.exists()) {
                    const data = snap.data();
                    if(data.apiKey) document.getElementById('apiKey').value = data.apiKey;
                    if(data.customPersona) {
                        window.customPersona = data.customPersona;
                        document.getElementById('customSystemPrompt').value = data.customPersona;
                    }
                    if(data.aiTrainingRules) window.memoryTrainingRules = data.aiTrainingRules;
                    if(data.pmSpecList) window.memorySpecList = data.pmSpecList;
                    
                    if(data.innerTemplateBase64) {
                        window.templates.Inner = data.innerTemplateBase64;
                        document.getElementById('statusInner').innerText = "✓ Ready";
                        document.getElementById('statusInner').className = "text-[10px] text-green-600 font-bold mt-1";
                    }
                    if(data.outerTemplateBase64) {
                        window.templates.Outer = data.outerTemplateBase64;
                        document.getElementById('statusOuter').innerText = "✓ Ready";
                        document.getElementById('statusOuter').className = "text-[10px] text-green-600 font-bold mt-1";
                    }
                }
            } catch(e) {}
        }

        // --- FULL AQL ENGINE ---
        const calculateAQL = (qty) => {
            const getLetter = (q) => {
                if (q <= 8) return ['A','A','A','A','A','A','B'];
                if (q <= 15) return ['A','A','A','A','A','B','C'];
                if (q <= 25) return ['A','A','B','B','B','C','D'];
                if (q <= 50) return ['A','B','B','C','C','D','E'];
                if (q <= 90) return ['B','B','C','C','C','E','F'];
                if (q <= 150) return ['B','B','C','D','D','F','G'];
                if (q <= 280) return ['B','C','D','E','E','G','H'];
                if (q <= 500) return ['B','C','D','E','F','H','J'];
                if (q <= 1200) return ['C','C','E','F','G','J','K']; 
                if (q <= 3200) return ['C','D','E','G','H','K','L'];
                if (q <= 10000) return ['C','D','F','G','J','L','M'];
                if (q <= 35000) return ['C','D','F','H','K','M','N'];
                if (q <= 150000) return ['D','E','G','J','L','N','P'];
                if (q <= 500000) return ['D','E','G','J','M','P','Q'];
                return ['D','E','H','K','N','Q','R']; 
            };
            const sizes = { 'A':2, 'B':3, 'C':5, 'D':8, 'E':13, 'F':20, 'G':32, 'H':50, 'J':80, 'K':125, 'L':200, 'M':315, 'N':500, 'P':800, 'Q':1250, 'R':2000 };
            const getPlan = (letter, aql) => {
                const aqlPlans = {
                    '1.0': [ {min: 'A', max: 'E', size: 13, ac: 0}, {min: 'F', max: 'H', size: 50, ac: 1}, {min: 'J', max: 'J', size: 80, ac: 2}, {min: 'K', max: 'K', size: 125, ac: 3}, {min: 'L', max: 'L', size: 200, ac: 5}, {min: 'M', max: 'M', size: 315, ac: 7}, {min: 'N', max: 'N', size: 500, ac: 10}, {min: 'P', max: 'P', size: 800, ac: 14}, {min: 'Q', max: 'R', size: 1250, ac: 21} ],
                    '2.5': [ {min: 'A', max: 'C', size: 5, ac: 0}, {min: 'D', max: 'F', size: 20, ac: 1}, {min: 'G', max: 'G', size: 32, ac: 2}, {min: 'H', max: 'H', size: 50, ac: 3}, {min: 'J', max: 'J', size: 80, ac: 5}, {min: 'K', max: 'K', size: 125, ac: 7}, {min: 'L', max: 'L', size: 200, ac: 10}, {min: 'M', max: 'M', size: 315, ac: 14}, {min: 'N', max: 'R', size: 500, ac: 21} ],
                    '4.0': [ {min: 'A', max: 'B', size: 3, ac: 0}, {min: 'C', max: 'E', size: 13, ac: 1}, {min: 'F', max: 'F', size: 20, ac: 2}, {min: 'G', max: 'G', size: 32, ac: 3}, {min: 'H', max: 'H', size: 50, ac: 5}, {min: 'J', max: 'J', size: 80, ac: 7}, {min: 'K', max: 'K', size: 125, ac: 10}, {min: 'L', max: 'L', size: 200, ac: 14}, {min: 'M', max: 'R', size: 315, ac: 21} ]
                };
                if(aqlPlans[aql]) {
                    const letterCode = letter.charCodeAt(0);
                    for(let plan of aqlPlans[aql]) {
                        if(letterCode >= plan.min.charCodeAt(0) && letterCode <= plan.max.charCodeAt(0)) {
                            return { size: plan.size, ar: `${plan.ac}/${plan.ac + 1}` };
                        }
                    }
                }
                return { size: sizes[letter], ar: "0/1" };
            };
            const letters = getLetter(qty);
            const lvl1 = getPlan(letters[4], '1.0'); 
            const lvl2 = getPlan(letters[5], '2.5'); 
            const lvl3 = getPlan(letters[6], '4.0'); 
            return {
                s_s1: sizes[letters[0]], ar_s1: "0/1", s_s2: sizes[letters[1]], ar_s2: "0/1",
                s_s3: sizes[letters[2]], ar_s3: "0/1", s_s4: sizes[letters[3]], ar_s4: "0/1",
                s_lvl1: lvl1.size, ar_lvl1: lvl1.ar, s_lvl2: lvl2.size, ar_lvl2: lvl2.ar, s_lvl3: lvl3.size, ar_lvl3: lvl3.ar
            };
        };

        const getSpec = (brandName, category) => {
            const listStr = window.memorySpecList; 
            if (!listStr || listStr.trim() === '') return category === 'Outer' ? "Standard Outer Corrugated Box (As per Master)" : "Standard ITC Cyber XL Board With MET PET, Printing Embossing, Spot UV and UV Coating";
            const lines = listStr.split('\n');
            let lowerBrand = brandName.toLowerCase().trim();
            let lowerCat = category.toLowerCase().trim();
            for (let line of lines) {
                let lowerLine = line.toLowerCase();
                if (lowerLine.includes(lowerBrand) && lowerLine.includes(lowerCat)) {
                    let parts = line.split(/[:=-]/);
                    if (parts.length > 1) { parts.shift(); return parts.join(':').trim(); } else { return line.trim(); }
                }
            }
            for (let line of lines) {
                let lowerLine = line.toLowerCase();
                if (lowerLine.includes(lowerBrand) && !lowerLine.includes('inner') && !lowerLine.includes('outer')) {
                     let parts = line.split(/[:=-]/);
                     if (parts.length > 1) { parts.shift(); return parts.join(':').trim(); }
                }
            }
            return category === 'Outer' ? "Standard Outer Corrugated Box (As per Master)" : "Standard ITC Cyber XL Board With MET PET, Printing Embossing, Spot UV and UV Coating";
        };

        const generateGSMMath = (minGSM, maxGSM) => {
            let mathObj = {};
            let total = 0;
            for(let i=1; i<=9; i++) {
                let randomGsm = Math.random() * (maxGSM - minGSM) + minGSM;
                let calculatedWeight = (randomGsm * 0.625) / 1000;
                mathObj[`w${i}`] = calculatedWeight.toFixed(3);
                mathObj[`g${i}`] = randomGsm.toFixed(1);
                total += randomGsm;
            }
            mathObj.avg_gsm = (total / 9).toFixed(1);
            return mathObj;
        };

        async function callGeminiAPI() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const modelName = document.getElementById('aiModel').value;
            showTypingIndicator();
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        contents: window.chatHistory,
                        generationConfig: { temperature: 0.2 } 
                    })
                });

                if(!res.ok) throw new Error((await res.json()).error.message);

                const data = await res.json();
                removeTypingIndicator();
                
                const aiText = data.candidates[0].content.parts[0].text;
                window.chatHistory.push({ role: "model", parts: [{text: aiText}] });

                let jsonMatch = aiText.match(/```json\n([\s\S]*?)\n```/) || aiText.match(/```\n([\s\S]*?)\n```/);
                let rawJson = jsonMatch ? jsonMatch[1] : null;
                
                if (!rawJson && aiText.includes('"batches"')) {
                    try {
                        let bracketMatch = aiText.match(/\{[\s\S]*"batches"[\s\S]*\}/);
                        if(bracketMatch) rawJson = bracketMatch[0];
                    } catch(e){}
                }

                if (rawJson) {
                    appendChatMessage("adi papa bhai, Data ready hai! Niche table check kar lo. ✅", "ai");
                    processExtractedJson(rawJson);
                } else {
                    appendChatMessage(aiText, "ai");
                }

            } catch (e) {
                removeTypingIndicator();
                appendChatMessage("❌ API Error: " + e.message, "ai");
            }
        }

        function processExtractedJson(rawJsonStr) {
            try {
                const info = JSON.parse(rawJsonStr);
                const processedBatches = info.batches.map(b => {
                    let qty = parseInt(b.receivedQty) || 0;
                    let cat = (b.category === 'Outer' || b.category === 'outer') ? 'Outer' : 'Inner';
                    
                    let minG = parseFloat(b.target_min_gsm);
                    let maxG = parseFloat(b.target_max_gsm);
                    if (isNaN(minG) || isNaN(maxG)) { minG = cat === 'Outer' ? 350 : 253; maxG = cat === 'Outer' ? 355 : 255; }

                    let finalSpec = b.spec;
                    if (!finalSpec || finalSpec.length < 5) finalSpec = getSpec(b.brandName, cat);

                    return { 
                        brand: b.brandName || "", batch: b.batchNo || "", qty, category: cat,
                        po_no: b.po_no || "", po_date: b.po_date || "", ar_no: b.ar_no || "", ar_date: b.ar_date || "",
                        spec: finalSpec, target_min: minG, target_max: maxG,
                        ...calculateAQL(qty), ...generateGSMMath(minG, maxG) 
                    };
                });

                window.extractedData = {
                    supplier: info.supplierName || "", approvalNo: info.approvalNo || "", 
                    grnNo: info.grnNo || "", dcNo: info.dcNo || "", dcDate: info.dcDate || "", 
                    batches: processedBatches
                };

                updateFormUI();
                document.getElementById('resultSection').classList.remove('hidden');
                
            } catch(e) {
                appendChatMessage("❌ JSON Error: AI ne data galat format me diya.", "ai");
            }
        }

        window.updateBatch = function(index, field, value) {
            window.extractedData.batches[index][field] = value;
            if(field === 'qty') Object.assign(window.extractedData.batches[index], calculateAQL(parseInt(value)||0));
            if(field === 'category') {
                let cat = value;
                window.extractedData.batches[index].spec = getSpec(window.extractedData.batches[index].brand, cat);
                let minG = cat === 'Outer' ? 350 : 253;
                let maxG = cat === 'Outer' ? 355 : 255;
                window.extractedData.batches[index].target_min = minG;
                window.extractedData.batches[index].target_max = maxG;
                Object.assign(window.extractedData.batches[index], generateGSMMath(minG, maxG));
            }
            if (field === 'target_min' || field === 'target_max') {
                window.extractedData.batches[index][field] = parseFloat(value);
                Object.assign(window.extractedData.batches[index], generateGSMMath(window.extractedData.batches[index].target_min, window.extractedData.batches[index].target_max));
            }
            renderBatchTable();
        }

        window.downloadWord = function(targetCategory) {
            syncCommonData();
            if(!window.extractedData || window.extractedData.batches.length === 0) return alert("Pehle data add karein.");
            const templateDataUrl = window.templates[targetCategory];
            if(!templateDataUrl) return alert(`🚨 Pehle ${targetCategory} ka Word Template (.docx) upload karein!`);
            const filteredBatches = window.extractedData.batches.filter(b => b.category === targetCategory);
            if(filteredBatches.length === 0) return alert(`Is GRN me koi bhi item '${targetCategory}' nahi hai.`);
            
            let ZipConstructor;
            if (typeof window.PizZip !== 'undefined') ZipConstructor = window.PizZip;
            else if (typeof PizZip !== 'undefined') ZipConstructor = PizZip;
            else return alert("🚨 LIBRARY ERROR: Kripya apne mobile browser ka cache clear karein ya page refresh karein.");

            try {
                const base64Data = templateDataUrl.split(',')[1];
                const zip = new ZipConstructor(base64Data, { base64: true });
                const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                
                const finalData = filteredBatches.map(b => ({
                    ...b, supplier: window.extractedData.supplier, approval_no: window.extractedData.approvalNo, 
                    grn: window.extractedData.grnNo, dc_no: window.extractedData.dcNo, dc_date: window.extractedData.dcDate
                }));
                
                doc.render({ batches: finalData });
                const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                window.saveAs(out, `QC_${targetCategory}_Report_${window.extractedData.grnNo.replace(/\//g,'-')}.docx`);
                showToast(`${targetCategory} File Downloaded!`, "success");
            } catch(error) { alert("🚨 WORD TEMPLATE ERROR 🚨\nMS Word me khol kar 'Save As -> .docx' karein."); }
        }

                        <div>
                            <div class="text-lg font-black text-gray-800">📄 GRN No: ${record.grnNo}</div>
                            <div class="text-xs font-bold text-gray-500 mt-1">Supplier: ${record.supplier} | Batches: <span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full">${record.batches?.length || 0}</span> | Time: ${new Date(record.timestamp).toLocaleString()}</div>
                        </div>
                        <div class="flex gap-4 items-center">
                            <span class="text-gray-400 text-xl font-bold">${isExpanded ? '▲' : '▼'}</span>
                            <button onclick="event.stopPropagation(); deleteRecord('${record.id}')" class="text-white bg-red-50 text-red-500 hover:bg-red-100 border border-red-200 px-3 py-1 rounded font-bold transition text-xs">Delete</button>
                        </div>
                    </div>`;

                if(isExpanded) {
                    html += `<div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">`;
                    record.batches.forEach((b, i) => {
                        let isInner = b.category === 'Inner';
                        let catColor = isInner ? 'blue' : 'purple';
                        
                        let gsmLinesHtml = '';
                        for(let k=1; k<=9; k++) {
                            gsmLinesHtml += `
                            <div class="flex justify-between text-[10px] border-b border-gray-100 pb-1">
                                <span class="text-gray-500">${k}) ${b['w'+k]} / 0.625 x 1000 =</span>
                                <span class="font-bold text-gray-800">${b['g'+k]}</span>
                            </div>`;
                        }

                        html += `
                        <div class="border border-gray-200 rounded-xl p-4 shadow-sm relative">
                            <span class="absolute top-0 left-0 bg-${catColor}-50 text-${catColor}-600 border border-${catColor}-200 text-[10px] font-bold px-2 py-1 rounded-br-lg uppercase">${b.category}</span>
                            <h4 class="text-lg font-black text-gray-800 mb-1 mt-4">${b.brand}</h4>
                            <div class="text-sm font-mono text-gray-600 mb-2">Batch: <span class="font-bold text-blue-600">${b.batch}</span> | Qty: <span class="font-bold text-green-600">${b.qty}</span></div>
                            
                            <div class="flex justify-start mb-3 mt-2">
                                <div class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-black border border-green-300">
                                    Avg GSM: ${b.avg_gsm}
                                </div>
                            </div>
                            
                            <details class="bg-gray-50 border border-gray-200 rounded-lg text-xs mt-3">
                                <summary class="font-bold text-gray-600 p-2 cursor-pointer outline-none hover:bg-gray-100 rounded-lg flex justify-between items-center">
                                    <span>📊 Details & 9 Calcs</span>
                                    <span class="text-blue-500">▼</span>
                                </summary>
                                <div class="p-3 border-t border-gray-200 space-y-2">
                                    <div class="text-[9px] font-mono text-gray-500 bg-white p-2 rounded border"><b>Spec:</b> ${b.spec}</div>
                                    <div class="grid grid-cols-2 gap-2 text-[9px] bg-white p-2 rounded border">
                                        <div>PO: ${b.po_no} (${b.po_date})</div><div>AR: ${b.ar_no} (${b.ar_date})</div>
                                    </div>
                                    <div class="grid grid-cols-3 gap-1 text-[9px] font-mono bg-blue-50 p-2 rounded border border-blue-100">
                                        <div>S-1: ${b.s_s1}</div><div>S-2: ${b.s_s2}</div><div>S-3: ${b.s_s3}</div>
                                        <div>L-I: ${b.s_lvl1}</div><div>L-II: ${b.s_lvl2}</div><div>L-III: ${b.s_lvl3}</div>
                                    </div>
                                    <div class="bg-white p-2 rounded border border-gray-200">
                                        <p class="text-[9px] font-bold text-gray-500 border-b pb-1 mb-1">9 Samples</p>
                                        <div class="grid grid-cols-1 font-mono">${gsmLinesHtml}</div>
                                    </div>
                                </div>
                            </details>
                        </div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        window.toggleExpand = function(id) { window.expandedGrnId = window.expandedGrnId === id ? null : id; renderWorkbook(); }
        window.deleteRecord = async function(id) { if(confirm("Are you sure?")) await deleteDoc(doc(db, 'users', currentUser.uid, 'qc_word_history_master', id)); }
    </script>
</body>
</html>
