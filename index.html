<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPPL QC Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1e40af; }
        
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #1e3a8a;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col overflow-hidden">

    <div id="loginScreen" class="absolute inset-0 bg-blue-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96 max-w-full">
            <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">UPPL QC Center</h2>
            <div id="authError" class="hidden text-red-500 text-sm mb-4 text-center"></div>
            <input type="email" id="authEmail" placeholder="Email" class="w-full mb-4 p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="authPassword" placeholder="Password" class="w-full mb-6 p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded mb-2 transition">Login</button>
            <button id="btnSignup" class="w-full bg-gray-200 hover:bg-gray-300 text-blue-900 font-bold py-3 rounded transition">Sign Up</button>
        </div>
    </div>

    <div id="mainApp" class="hidden flex flex-col h-full">
        
        <nav class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-40 flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <h1 class="text-xl font-bold tracking-wider">UPPL QC</h1>
                <div class="flex space-x-2">
                    <button id="tabScannerBtn" class="px-4 py-2 bg-blue-700 rounded-md font-semibold transition hover:bg-blue-600">📝 QC Scanner</button>
                    <button id="tabPCBtn" class="px-4 py-2 bg-blue-800 rounded-md font-semibold transition hover:bg-blue-600">💻 PC View</button>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button id="btnSettings" class="p-2 bg-blue-800 rounded-full hover:bg-blue-700 transition" title="Settings">⚙️</button>
                <span id="userBadge" class="bg-blue-800 px-3 py-1 rounded-full text-sm"></span>
                <button id="btnLogout" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-bold transition">Logout</button>
            </div>
        </nav>

        <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
            <div class="bg-white w-[600px] max-h-[90vh] overflow-y-auto p-6 rounded-xl shadow-2xl relative">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">Settings</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Gemini API Key</label>
                        <input type="password" id="setApiKey" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">AI Model</label>
                        <input type="text" id="setModel" value="gemini-2.5-flash" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Custom Persona / Context</label>
                        <textarea id="setPersona" rows="3" class="w-full p-2 border rounded">Act as "adi papa" (talk in Hinglish first).</textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">PM Spec Master List (JSON/Text)</label>
                        <textarea id="setPMSpec" rows="3" class="w-full p-2 border rounded"></textarea>
                    </div>
                    <div class="border-t pt-4">
                        <label class="block text-sm font-bold mb-1">INNER Word Template (.docx)</label>
                        <input type="file" id="setInnerDoc" accept=".docx" class="w-full p-2 text-sm border rounded">
                        <p id="innerDocStatus" class="text-xs text-green-600 mt-1"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">OUTER Word Template (.docx)</label>
                        <input type="file" id="setOuterDoc" accept=".docx" class="w-full p-2 text-sm border rounded">
                        <p id="outerDocStatus" class="text-xs text-green-600 mt-1"></p>
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <button id="btnCancelSettings" class="px-4 py-2 bg-gray-300 rounded font-bold hover:bg-gray-400">Cancel</button>
                    <button id="btnSaveSettings" class="px-4 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700">Save Config</button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-hidden relative bg-gray-200">
            
            <div id="tabScanner" class="absolute inset-0 flex flex-col h-full bg-gray-50 overflow-y-auto">
                
                <div class="p-4 bg-white shadow flex items-center justify-between z-10">
                    <button id="btnStartAI" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 shadow transition">
                        🤖 Start AI Assistant
                    </button>
                    <div class="flex gap-2">
                        <button id="btnSendToPC" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold shadow transition">
                            📤 SEND DATA TO PC
                        </button>
                    </div>
                </div>

                <div id="chatArea" class="hidden bg-gray-100 border-b shadow-inner p-4 flex flex-col max-h-[40vh]">
                    <div id="chatMessages" class="flex-1 overflow-y-auto space-y-3 mb-3 p-2 bg-white rounded border h-48"></div>
                    
                    <div class="flex items-center space-x-2">
                        <label class="cursor-pointer p-2 bg-gray-200 hover:bg-gray-300 rounded text-xl" title="Attach Photo">
                            📎 <input type="file" id="chatAttachment" accept="image/*" class="hidden">
                        </label>
                        <input type="text" id="chatInput" placeholder="Type message or GRN No to auto-load..." class="flex-1 p-2 border rounded focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <button id="btnSendChat" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded font-bold transition flex items-center justify-center min-w-[80px]">
                            Send
                        </button>
                    </div>
                    <div id="attachmentPreview" class="text-xs text-blue-600 mt-1 hidden">Attached: Image</div>
                </div>

                <div class="flex-1 p-6 overflow-y-auto">
                    <div class="bg-white p-5 rounded-xl shadow border mb-6">
                        <h3 class="font-bold text-lg mb-4 text-blue-900 border-b pb-2">Common Information</h3>
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                            <div><label class="text-xs text-gray-500 font-bold">Supplier</label><input type="text" id="inpSupplier" class="w-full border-b p-1 bg-transparent focus:outline-none focus:border-blue-500 common-input"></div>
                            <div><label class="text-xs text-gray-500 font-bold">Approval No</label><input type="text" id="inpApproval" class="w-full border-b p-1 bg-transparent focus:outline-none focus:border-blue-500 common-input"></div>
                            <div><label class="text-xs text-gray-500 font-bold">GRN No</label><input type="text" id="inpGRN" class="w-full border-b p-1 bg-transparent focus:outline-none focus:border-blue-500 common-input"></div>
                            <div><label class="text-xs text-gray-500 font-bold">DC No</label><input type="text" id="inpDC" class="w-full border-b p-1 bg-transparent focus:outline-none focus:border-blue-500 common-input"></div>
                            <div><label class="text-xs text-gray-500 font-bold">DC Date</label><input type="text" id="inpDCDate" class="w-full border-b p-1 bg-transparent focus:outline-none focus:border-blue-500 common-input"></div>
                        </div>
                    </div>

                    <div id="batchesContainer" class="space-y-6">
                        </div>
                </div>
            </div>

            <div id="tabPCView" class="hidden absolute inset-0 flex flex-col h-full bg-gray-100 overflow-y-auto p-6">
                <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow">
                    <h2 class="text-2xl font-bold text-blue-900">PC View (QC History)</h2>
                    <div class="space-x-2">
                        <button id="btnDownloadInner" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded font-bold transition shadow">Download Merged INNER</button>
                        <button id="btnDownloadOuter" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded font-bold transition shadow">Download Merged OUTER</button>
                    </div>
                </div>

                <div id="historyContainer" class="space-y-4">
                    </div>
            </div>

        </div>
    </div>

    <script type="module">
        // --- 1. FIREBASE SETUP & IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnt87woppTbR8b1d9cCaqFTQOptf2YGAA",
            authDomain: "salary-tracker-768a9.firebaseapp.com", // Corrected domain error from prompt for stability
            projectId: "salary-tracker-768a9",
            storageBucket: "salary-tracker-768a9.firebasestorage.app",
            messagingSenderId: "533403739591",
            appId: "1:533403739591:web:ceba8d71751b1963fd25e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 2. GLOBAL STATE ---
        let currentUser = null;
        let settings = {
            apiKey: '', model: 'gemini-2.5-flash', persona: '', pmSpec: '', innerDocBase64: '', outerDocBase64: ''
        };
        let chatHistoryData = []; // To cache PC View data for auto-load

        // This holds the live session data
        window.extractedData = {
            supplierName: "", approvalNo: "", grnNo: "", dcNo: "", dcDate: "", batches: []
        };

        // --- 3. DOM ELEMENTS ---
        const UI = {
            login: document.getElementById('loginScreen'),
            app: document.getElementById('mainApp'),
            email: document.getElementById('authEmail'),
            pass: document.getElementById('authPassword'),
            error: document.getElementById('authError'),
            badge: document.getElementById('userBadge'),
            tabs: { scanner: document.getElementById('tabScanner'), pc: document.getElementById('tabPCView') },
            btns: { tabScan: document.getElementById('tabScannerBtn'), tabPC: document.getElementById('tabPCBtn') },
            chat: {
                area: document.getElementById('chatArea'), messages: document.getElementById('chatMessages'),
                input: document.getElementById('chatInput'), attach: document.getElementById('chatAttachment'),
                preview: document.getElementById('attachmentPreview')
            },
            common: {
                supplier: document.getElementById('inpSupplier'), approval: document.getElementById('inpApproval'),
                grn: document.getElementById('inpGRN'), dc: document.getElementById('inpDC'), dcDate: document.getElementById('inpDCDate')
            },
            batches: document.getElementById('batchesContainer'),
            history: document.getElementById('historyContainer')
        };

        // --- 4. AUTHENTICATION ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                UI.login.classList.add('hidden');
                UI.app.classList.remove('hidden');
                UI.badge.textContent = user.email;
                await loadSettings();
                await loadActiveSession();
                await fetchHistoryData(); 
            } else {
                currentUser = null;
                UI.login.classList.remove('hidden');
                UI.app.classList.add('hidden');
            }
        });

        document.getElementById('btnLogin').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, UI.email.value, UI.pass.value)
                .catch(e => { UI.error.textContent = e.message; UI.error.classList.remove('hidden'); });
        });
        document.getElementById('btnSignup').addEventListener('click', () => {
            createUserWithEmailAndPassword(auth, UI.email.value, UI.pass.value)
                .catch(e => { UI.error.textContent = e.message; UI.error.classList.remove('hidden'); });
        });
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        // --- 5. TABS & SETTINGS ---
        UI.btns.tabScan.addEventListener('click', () => {
            UI.tabs.scanner.classList.remove('hidden'); UI.tabs.pc.classList.add('hidden');
            UI.btns.tabScan.classList.replace('bg-blue-800','bg-blue-700'); UI.btns.tabPC.classList.replace('bg-blue-700','bg-blue-800');
        });
        UI.btns.tabPC.addEventListener('click', () => {
            UI.tabs.pc.classList.remove('hidden'); UI.tabs.scanner.classList.add('hidden');
            UI.btns.tabPC.classList.replace('bg-blue-800','bg-blue-700'); UI.btns.tabScan.classList.replace('bg-blue-700','bg-blue-800');
            renderPCView();
        });

        document.getElementById('btnSettings').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('hidden'));
        document.getElementById('btnCancelSettings').addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
        document.getElementById('btnSaveSettings').addEventListener('click', saveSettings);

        async function loadSettings() {
            const docSnap = await getDoc(doc(db, `users/${currentUser.uid}/config/settings`));
            if (docSnap.exists()) {
                settings = docSnap.data();
                document.getElementById('setApiKey').value = settings.apiKey || '';
                document.getElementById('setModel').value = settings.model || 'gemini-2.5-flash';
                document.getElementById('setPersona').value = settings.persona || '';
                document.getElementById('setPMSpec').value = settings.pmSpec || '';
                if(settings.innerDocBase64) document.getElementById('innerDocStatus').textContent = 'Template loaded.';
                if(settings.outerDocBase64) document.getElementById('outerDocStatus').textContent = 'Template loaded.';
            }
        }

        async function saveSettings() {
            settings.apiKey = document.getElementById('setApiKey').value;
            settings.model = document.getElementById('setModel').value;
            settings.persona = document.getElementById('setPersona').value;
            settings.pmSpec = document.getElementById('setPMSpec').value;
            
            // Handle Files
            const processFile = (fileInput) => new Promise((resolve) => {
                const file = fileInput.files[0];
                if (!file) return resolve(null);
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result.split(',')[1]); // get base64 part
                reader.readAsDataURL(file);
            });

            const innerB64 = await processFile(document.getElementById('setInnerDoc'));
            const outerB64 = await processFile(document.getElementById('setOuterDoc'));
            if(innerB64) settings.innerDocBase64 = innerB64;
            if(outerB64) settings.outerDocBase64 = outerB64;

            await setDoc(doc(db, `users/${currentUser.uid}/config/settings`), settings);
            document.getElementById('settingsModal').classList.add('hidden');
            alert("Settings Saved!");
        }

        // --- 6. DATA & AUTO-SAVE ---
        async function loadActiveSession() {
            const snap = await getDoc(doc(db, `users/${currentUser.uid}/active_session/current_scan`));
            if (snap.exists()) {
                window.extractedData = snap.data();
                renderResult();
            }
        }

        let saveTimeout;
        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                if(currentUser) {
                    await setDoc(doc(db, `users/${currentUser.uid}/active_session/current_scan`), window.extractedData);
                }
            }, 1000);
        }

        // Attach listeners to common inputs
        Object.keys(UI.common).forEach(k => {
            UI.common[k].addEventListener('input', (e) => {
                window.extractedData[k + (k === 'supplier' ? 'Name' : k === 'approval' ? 'No' : k === 'grn' ? 'No' : k === 'dc' ? 'No' : '')] = e.target.value;
                autoSave();
            });
        });

        // --- 7. CHAT & AI INTEGRATION ---
        let attachedImageBase64 = null;
        
        document.getElementById('btnStartAI').addEventListener('click', () => {
            UI.chat.area.classList.toggle('hidden');
        });

        UI.chat.attach.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = ev => { attachedImageBase64 = ev.target.result.split(',')[1]; UI.chat.preview.classList.remove('hidden'); };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('btnSendChat').addEventListener('click', handleChatSubmit);
        UI.chat.input.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChatSubmit(); });

        async function handleChatSubmit() {
            const text = UI.chat.input.value.trim();
            if(!text && !attachedImageBase64) return;
            
            appendMessage('You', text, attachedImageBase64 ? '📷 [Image Attached]' : null);
            UI.chat.input.value = '';
            
            // Auto-Load Check: Search GRN in history
            const historyMatch = chatHistoryData.find(d => d.grnNo === text);
            if (historyMatch) {
                appendMessage('System', `GRN ${text} found in history. Loading...`);
                window.extractedData = JSON.parse(JSON.stringify(historyMatch)); // Deep copy
                renderResult();
                autoSave();
                return;
            }

            if (!settings.apiKey) return appendMessage('Error', 'Please configure Gemini API Key in Settings.');

            const btnSend = document.getElementById('btnSendChat');
            btnSend.innerHTML = '<div class="loader"></div>';
            btnSend.disabled = true;

            try {
                const promptParts = [
                    {text: `${settings.persona}. Extract GRN data from photo/text. ALWAYS output a raw JSON block at the END of the response exactly like this:
{"supplierName": "...", "approvalNo": "...", "grnNo": "...", "dcNo": "...", "dcDate": "...", "batches": [ { "brandName": "...", "batchNo": "...", "receivedQty": "...", "category": "Inner or Outer", "po_no": "...", "po_date": "...", "ar_no": "...", "ar_date": "...", "target_min_gsm": 253, "target_max_gsm": 255, "spec": "..." } ]} \n\n User Input: ${text}` }
                ];
                if(attachedImageBase64) {
                    promptParts.push({ inlineData: { mimeType: "image/jpeg", data: attachedImageBase64 } });
                }

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${settings.model}:generateContent?key=${settings.apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: promptParts }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage('AI', aiText);

                // Parse JSON block at the end
                const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    const parsed = JSON.parse(jsonMatch[0]);
                    mergeExtractedData(parsed);
                }

            } catch (err) {
                appendMessage('Error', err.message);
            } finally {
                btnSend.innerText = 'Send';
                btnSend.disabled = false;
                attachedImageBase64 = null;
                UI.chat.attach.value = '';
                UI.chat.preview.classList.add('hidden');
            }
        }

        function appendMessage(sender, text, attachmentHint = null) {
            const div = document.createElement('div');
            div.className = `p-2 rounded ${sender==='You'?'bg-blue-100 ml-8':'bg-gray-200 mr-8'}`;
            div.innerHTML = `<span class="font-bold text-xs text-gray-600 block">${sender}</span>
                             ${attachmentHint ? `<span class="text-xs text-blue-500 block mb-1">${attachmentHint}</span>`:''}
                             <span class="text-sm whitespace-pre-wrap">${text}</span>`;
            UI.chat.messages.appendChild(div);
            UI.chat.messages.scrollTop = UI.chat.messages.scrollHeight;
        }

        function mergeExtractedData(json) {
            window.extractedData.supplierName = json.supplierName || "";
            window.extractedData.approvalNo = json.approvalNo || "";
            window.extractedData.grnNo = json.grnNo || "";
            window.extractedData.dcNo = json.dcNo || "";
            window.extractedData.dcDate = json.dcDate || "";
            
            if(json.batches && Array.isArray(json.batches)) {
                window.extractedData.batches = json.batches.map(b => {
                    // Init empty 9 samples if missing
                    let samples = b.samples && b.samples.length === 9 ? b.samples : Array(9).fill({weight: 0, gsm: 0});
                    return { ...b, samples, avg_gsm: b.avg_gsm || "" };
                });
            }
            renderResult();
            autoSave();
        }

        // --- 8. MATH & REVERSE CALCULATIONS (CRITICAL ENGINE) ---
        function calcWeight(gsm) { return parseFloat(((gsm * 0.625) / 1000).toFixed(3)); }
        function calcGSM(weight) { return parseFloat(((weight / 0.625) * 1000).toFixed(2)); }

        // Make functions globally accessible for inline HTML event handlers
        window.updateManualGSM = function(batchIndex, sampleIndex, element) {
            let gsmVal = parseFloat(element.value);
            if(isNaN(gsmVal)) gsmVal = 0;
            
            let w = calcWeight(gsmVal);
            let derivedGsm = calcGSM(w);

            window.extractedData.batches[batchIndex].samples[sampleIndex] = { weight: w, gsm: derivedGsm };
            
            // Recalc average
            let totalGsm = window.extractedData.batches[batchIndex].samples.reduce((acc, s) => acc + s.gsm, 0);
            window.extractedData.batches[batchIndex].avg_gsm = (totalGsm / 9).toFixed(2);
            
            autoSave();
            renderResult();
        };

        window.generateGSM = function(batchIndex) {
            let targetInput = document.getElementById(`targetAvg_${batchIndex}`);
            let target = parseFloat(targetInput.value);
            if(isNaN(target)) return alert("Enter valid target.");

            let baseW = calcWeight(target);
            let weights = Array(9).fill(baseW);

            for(let i=0; i<30; i++) {
                let idx1 = Math.floor(Math.random() * 9);
                let idx2 = Math.floor(Math.random() * 9);
                if(idx1 !== idx2) {
                    weights[idx1] += 0.001;
                    weights[idx2] -= 0.001;
                    
                    let gsm1 = calcGSM(weights[idx1]);
                    let gsm2 = calcGSM(weights[idx2]);
                    
                    // Enforce bounds (target +/- 15 limit)
                    if(Math.abs(gsm1 - target) > 15 || Math.abs(gsm2 - target) > 15) {
                        weights[idx1] -= 0.001;
                        weights[idx2] += 0.001;
                    }
                }
            }

            window.extractedData.batches[batchIndex].samples = weights.map(w => ({weight: w, gsm: calcGSM(w)}));
            window.extractedData.batches[batchIndex].avg_gsm = target.toString();
            
            autoSave();
            renderResult();
        };

        window.updateBatchField = function(batchIndex, field, value) {
            window.extractedData.batches[batchIndex][field] = value;
            autoSave();
        }
        
        window.addEmptyBatch = function() {
            window.extractedData.batches.push({
                brandName: "", batchNo: "", receivedQty: "", category: "Inner", 
                po_no: "", po_date: "", ar_no: "", ar_date: "", target_min_gsm: 0, target_max_gsm: 0, spec: "",
                avg_gsm: "", samples: Array(9).fill({weight: 0, gsm: 0})
            });
            renderResult();
            autoSave();
        }

        window.removeBatch = function(idx) {
            window.extractedData.batches.splice(idx, 1);
            renderResult();
            autoSave();
        }


        // --- 9. RENDER UI ---
        function renderResult() {
            UI.common.supplier.value = window.extractedData.supplierName || '';
            UI.common.approval.value = window.extractedData.approvalNo || '';
            UI.common.grn.value = window.extractedData.grnNo || '';
            UI.common.dc.value = window.extractedData.dcNo || '';
            UI.common.dcDate.value = window.extractedData.dcDate || '';

            UI.batches.innerHTML = '';
            
            window.extractedData.batches.forEach((b, bIdx) => {
                let sampleHTML = '';
                for(let i=0; i<9; i++) {
                    let s = b.samples[i];
                    sampleHTML += `
                        <div class="flex flex-col">
                            <label class="text-[10px] text-gray-500 text-center">S${i+1}</label>
                            <input type="number" step="0.01" value="${s.gsm || ''}" onchange="updateManualGSM(${bIdx}, ${i}, this)" 
                                   class="border border-blue-300 rounded p-1 text-center text-sm font-semibold text-blue-900 focus:ring-2 focus:ring-blue-500 w-full">
                            <div class="text-[10px] text-gray-400 text-center mt-1 w-full truncate" title="Weight: ${s.weight}">w: ${s.weight}</div>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl shadow-md border-l-4 border-blue-600 relative";
                card.innerHTML = `
                    <button onclick="removeBatch(${bIdx})" class="absolute top-2 right-2 text-red-500 hover:text-red-700 text-xl font-bold">&times;</button>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                        <div><label class="text-xs font-bold text-gray-600">Brand</label><input type="text" value="${b.brandName||''}" onchange="updateBatchField(${bIdx},'brandName',this.value)" class="w-full border-b focus:outline-none focus:border-blue-500"></div>
                        <div><label class="text-xs font-bold text-gray-600">Batch No</label><input type="text" value="${b.batchNo||''}" onchange="updateBatchField(${bIdx},'batchNo',this.value)" class="w-full border-b focus:outline-none focus:border-blue-500 text-blue-700 font-bold"></div>
                        <div><label class="text-xs font-bold text-gray-600">Qty</label><input type="text" value="${b.receivedQty||''}" onchange="updateBatchField(${bIdx},'receivedQty',this.value)" class="w-full border-b focus:outline-none focus:border-blue-500"></div>
                        <div>
                            <label class="text-xs font-bold text-gray-600">Category</label>
                            <select onchange="updateBatchField(${bIdx},'category',this.value)" class="w-full border-b focus:outline-none bg-transparent">
                                <option value="Inner" ${b.category==='Inner'?'selected':''}>Inner</option>
                                <option value="Outer" ${b.category==='Outer'?'selected':''}>Outer</option>
                            </select>
                        </div>
                        <div><label class="text-xs font-bold text-gray-600">AR No</label><input type="text" value="${b.ar_no||''}" onchange="updateBatchField(${bIdx},'ar_no',this.value)" class="w-full border-b text-sm focus:outline-none focus:border-blue-500"></div>
                        <div><label class="text-xs font-bold text-gray-600">AR Date</label><input type="text" value="${b.ar_date||''}" onchange="updateBatchField(${bIdx},'ar_date',this.value)" class="w-full border-b text-sm focus:outline-none focus:border-blue-500"></div>
                        <div><label class="text-xs font-bold text-gray-600">PO No</label><input type="text" value="${b.po_no||''}" onchange="updateBatchField(${bIdx},'po_no',this.value)" class="w-full border-b text-sm focus:outline-none focus:border-blue-500"></div>
                        <div><label class="text-xs font-bold text-gray-600">PO Date</label><input type="text" value="${b.po_date||''}" onchange="updateBatchField(${bIdx},'po_date',this.value)" class="w-full border-b text-sm focus:outline-none focus:border-blue-500"></div>
                    </div>
                    
                    <div class="bg-gray-50 p-4 rounded border">
                        <div class="flex flex-wrap items-center justify-between mb-3 border-b pb-2">
                            <div class="flex items-center space-x-4">
                                <h4 class="font-bold text-indigo-800">GSM Engine</h4>
                                <span class="text-xs text-gray-500">Min: ${b.target_min_gsm || 0} / Max: ${b.target_max_gsm || 0}</span>
                            </div>
                            <div class="flex items-center space-x-2">
                                <span class="font-bold text-sm">AVG: <span class="text-xl text-green-600">${b.avg_gsm || '0.00'}</span></span>
                                <input type="number" step="0.1" id="targetAvg_${bIdx}" placeholder="🎯 Target" class="w-24 p-1 border rounded text-sm text-center">
                                <button onclick="generateGSM(${bIdx})" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs font-bold shadow hover:bg-indigo-700">Generate</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-9 gap-1 sm:gap-2">
                            ${sampleHTML}
                        </div>
                    </div>
                `;
                UI.batches.appendChild(card);
            });

            // Add new batch button
            const addBtn = document.createElement('button');
            addBtn.className = "w-full border-2 border-dashed border-blue-400 text-blue-600 font-bold py-3 rounded-xl hover:bg-blue-50 transition";
            addBtn.innerText = "+ Add Manual Batch";
            addBtn.onclick = window.addEmptyBatch;
            UI.batches.appendChild(addBtn);
        }

        // --- 10. SEND TO PC VIEW ---
        document.getElementById('btnSendToPC').addEventListener('click', async () => {
            if(!window.extractedData.grnNo) return alert("GRN No is required to save.");
            
            try {
                const payload = {
                    ...window.extractedData,
                    timestamp: new Date().getTime()
                };
                await addDoc(collection(db, "qc_word_history_master"), payload);
                alert("Data sent to PC View successfully!");
                await fetchHistoryData();
            } catch (e) { alert("Error saving: " + e.message); }
        });

        // --- 11. PC VIEW & WORD DOC GEN ---
        async function fetchHistoryData() {
            const q = query(collection(db, "qc_word_history_master"), orderBy("timestamp", "desc"));
            const snapshot = await getDocs(q);
            chatHistoryData = [];
            snapshot.forEach(doc => {
                chatHistoryData.push({ id: doc.id, ...doc.data() });
            });
            if (!UI.tabs.pc.classList.contains('hidden')) renderPCView();
        }

        function renderPCView() {
            UI.history.innerHTML = '';
            chatHistoryData.forEach((item, index) => {
                const dateStr = new Date(item.timestamp).toLocaleString();
                const div = document.createElement('div');
                div.className = "bg-white border rounded shadow-sm";
                div.innerHTML = `
                    <div class="flex justify-between items-center p-4 bg-gray-50 border-b cursor-pointer" onclick="document.getElementById('histDetail_${index}').classList.toggle('hidden')">
                        <div class="flex items-center space-x-3">
                            <input type="checkbox" class="hist-check w-5 h-5 cursor-pointer" data-id="${item.id}" onclick="event.stopPropagation()">
                            <h3 class="font-bold text-lg text-blue-900">GRN: ${item.grnNo}</h3>
                            <span class="text-sm text-gray-500">| ${item.supplierName}</span>
                            <span class="text-sm text-gray-500 bg-gray-200 px-2 rounded-full">${item.batches.length} Batches</span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <span class="text-xs text-gray-400">${dateStr}</span>
                            <button onclick="deleteHistory('${item.id}', event)" class="text-red-500 hover:text-red-700 font-bold">🗑️</button>
                        </div>
                    </div>
                    <div id="histDetail_${index}" class="hidden p-4 grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
                        ${item.batches.map(b => `
                            <div class="border p-2 rounded text-xs bg-gray-50">
                                <div class="font-bold text-indigo-800">${b.brandName} - ${b.batchNo}</div>
                                <div>Qty: ${b.receivedQty} | Type: ${b.category}</div>
                                <div>AVG GSM: <span class="font-bold text-green-600">${b.avg_gsm}</span></div>
                            </div>
                        `).join('')}
                    </div>
                `;
                UI.history.appendChild(div);
            });
        }

        window.deleteHistory = async function(id, e) {
            e.stopPropagation();
            if(!confirm("Delete this record permanently?")) return;
            await deleteDoc(doc(db, "qc_word_history_master", id));
            await fetchHistoryData();
        }

        document.getElementById('btnDownloadInner').addEventListener('click', () => generateMergedWord('Inner'));
        document.getElementById('btnDownloadOuter').addEventListener('click', () => generateMergedWord('Outer'));

        function generateMergedWord(type) {
            const checkboxes = document.querySelectorAll('.hist-check:checked');
            if(checkboxes.length === 0) return alert("Select at least one GRN.");
            
            const base64Template = type === 'Inner' ? settings.innerDocBase64 : settings.outerDocBase64;
            if(!base64Template) return alert(`Please upload the ${type} template in Settings first.`);

            let mergedBatches = [];
            
            checkboxes.forEach(cb => {
                const record = chatHistoryData.find(d => d.id === cb.dataset.id);
                if(record) {
                    record.batches.forEach(b => {
                        if(b.category === type) {
                            // Deep copy to mutate
                            let batchCopy = JSON.parse(JSON.stringify(b));
                            // Inject common fields so they are accessible inside loop
                            batchCopy.supplierName = record.supplierName;
                            batchCopy.approvalNo = record.approvalNo;
                            batchCopy.grnNo = record.grnNo;
                            batchCopy.dcNo = record.dcNo;
                            batchCopy.dcDate = record.dcDate;
                            
                            // Transform rules
                            if(type === 'Inner') {
                                batchCopy.receivedQty = String(batchCopy.receivedQty).replace(/ Nos/g, '') + ' Nos';
                            }
                            
                            // Flatten samples for template ease (s1_gsm, s1_w, etc)
                            if(batchCopy.samples) {
                                batchCopy.samples.forEach((s, i) => {
                                    batchCopy[`s${i+1}_gsm`] = s.gsm;
                                    batchCopy[`s${i+1}_w`] = s.weight;
                                });
                            }
                            mergedBatches.push(batchCopy);
                        }
                    });
                }
            });

            if(mergedBatches.length === 0) return alert(`No ${type} batches found in selected GRNs.`);

            try {
                // Decode base64 
                const zipData = atob(base64Template);
                const charArray = new Uint8Array(zipData.length);
                for (let i = 0; i < zipData.length; i++) {
                    charArray[i] = zipData.charCodeAt(i);
                }

                const zip = new PizZip(charArray);
                const docTemplate = new window.docxtemplater(zip, {
                    paragraphLoop: true,
                    linebreaks: true,
                });

                // The template should use {#batches} ... {/batches} to loop over them
                docTemplate.render({ batches: mergedBatches });

                const out = docTemplate.getZip().generate({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                });
                saveAs(out, `Merged_${type}_QC_${new Date().getTime()}.docx`);

            } catch (error) {
                console.error(error);
                alert("Error generating document. Ensure template syntax is correct.");
            }
        }

    </script>
</body>
</html>
