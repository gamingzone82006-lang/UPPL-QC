<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>UPPL QC Command Center (v2.5 Auto-Switch Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.45.0/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f4f8; }
        
        #toast-container { position: fixed; top: 20px; right: 20px; left: 20px; md:left: auto; z-index: 9999; pointer-events: none;}
        .toast { min-width: 250px; padding: 16px; border-radius: 12px; color: white; margin-bottom: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); opacity: 0; transform: translateY(-20px); transition: all 0.3s ease; backdrop-filter: blur(5px); pointer-events: auto;}
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: rgba(16, 185, 129, 0.95); }
        .toast.error { background-color: rgba(239, 68, 68, 0.95); border-left: 6px solid #991b1b; font-weight: bold;}
        
        .chat-ai { background-color: white; border-color: #e2e8f0; color: #1f2937; border-bottom-left-radius: 0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .chat-user { background-color: #6366f1; border-color: #6366f1; color: white; border-bottom-right-radius: 0; align-self: flex-end; }
        
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #6366f1; border-radius: 50%; animation: typing 1s infinite; margin: 0 2px;}
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        /* 🔥 RESPONSIVE INPUTS */
        .futu-input { border-radius: 12px; border: 2px solid #e2e8f0; padding: 10px 12px; background: white; transition: all 0.2s; font-weight: 600; color: #1e293b; width: 100%; }
        .futu-input:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        
        .editable-gsm { border: 2px solid #cbd5e1; background: white; border-radius: 8px; transition: all 0.2s; font-family: monospace; width: 100%; }
        .editable-gsm:focus { border-color: #6366f1; background: #fff; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        
        /* Remove arrows from number inputs */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            alert("🚨 System Error aagaya bhai: \n" + message + "\n\nLine: " + lineno);
            return true; 
        };
    </script>
</head>
<body class="bg-gray-100 font-sans pb-24 relative overflow-x-hidden">

    <div id="toast-container"></div>

    <div id="userBadge" class="fixed bottom-4 left-4 md:top-4 md:bottom-auto md:right-4 md:left-auto bg-slate-900/90 backdrop-blur-sm text-white text-[10px] md:text-[11px] font-extrabold px-3 py-2 rounded-full shadow-2xl z-[60] hidden border border-green-400/50 flex items-center gap-2 pointer-events-none">
        👤 <span id="currentUserEmail">Loading...</span>
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-slate-950 bg-opacity-90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-10 w-full max-w-sm border border-slate-100 transition-transform duration-500 hover:scale-105 relative">
            <h2 class="text-3xl font-extrabold text-center bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent mb-2">UPPL QC</h2>
            <p class="text-center text-gray-500 font-bold text-xs uppercase tracking-widest mb-8">ADMIN PORTAL <span class="text-indigo-500 font-black">v2.5</span></p>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1.5 tracking-wider">Company ID</label>
                    <input type="email" id="loginEmail" placeholder="admin@uppl.com" class="futu-input text-base" style="font-family: monospace;">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1.5 tracking-wider">Password</label>
                    <input type="password" id="loginPass" placeholder="******" class="futu-input text-base">
                </div>
                <button onclick="window.handleLogin()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-extrabold py-4 rounded-xl shadow-lg hover:shadow-indigo-500/30 transition-all duration-300 transform active:scale-95">
                    Enter Dashboard
                </button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="bg-slate-950 shadow-xl sticky top-0 z-50">
            <div class="max-w-4xl mx-auto flex flex-row items-center justify-between overflow-x-auto hide-scrollbar">
                <div class="flex flex-row w-full">
                    <button id="tabScanBtn" onclick="window.switchTab('scan')" class="flex-1 py-4 px-2 font-extrabold text-center transition bg-slate-800 text-indigo-400 border-b-4 border-indigo-500 flex items-center justify-center gap-1 md:gap-2 text-[10px] md:text-sm uppercase tracking-wider whitespace-nowrap">
                        📝 Scanner
                    </button>
                    <button id="tabWorkbookBtn" onclick="window.switchTab('workbook')" class="flex-1 py-4 px-2 font-extrabold text-center transition text-slate-400 hover:bg-slate-800/50 flex items-center justify-center gap-1 md:gap-2 text-[10px] md:text-sm uppercase tracking-wider whitespace-nowrap">
                        💻 PC View
                    </button>
                </div>
                <button onclick="window.handleLogout()" class="px-4 md:px-6 py-4 font-bold text-center transition text-red-400 hover:bg-red-950/20 text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-800 whitespace-nowrap shrink-0">
                    Logout
                </button>
            </div>
        </div>

        <div class="max-w-4xl mx-auto mt-4 md:mt-8 px-2 md:px-4">
            
            <div id="scanTab" class="block">
                <details class="bg-white rounded-2xl md:rounded-3xl shadow-sm mb-4 md:mb-6 border border-slate-200 overflow-hidden">
                    <summary class="bg-slate-100 text-slate-900 font-extrabold p-4 md:p-5 cursor-pointer flex justify-between items-center hover:bg-slate-200/70 transition text-sm md:text-base">
                        <span>⚙️ Settings (Cloud Sync)</span>
                        <span class="text-[10px] md:text-[11px] bg-green-500 text-white px-2 py-1 md:px-3 md:py-1.5 rounded-full font-bold shadow-inner flex items-center gap-1" id="dbIndicator">✓ DB Safe</span>
                    </summary>
                    <div class="p-4 md:p-8 space-y-6 bg-slate-50">
                        <div class="bg-white p-4 rounded-xl border shadow-sm">
                            <label class="block text-xs font-bold text-gray-600 mb-1.5 tracking-wider">🔑 GitHub API Key</label>
                            <input type="password" id="apiKey" onchange="window.saveApiKeyToCloud()" placeholder="github_pat_..." class="futu-input text-xs md:text-sm mb-3" style="font-family: monospace;">
                            <select id="aiModel" class="futu-input font-bold text-xs md:text-sm text-blue-900 bg-white">
                                <option value="gpt-4o" selected>🧠 ChatGPT-4o (High Accuracy)</option>
                                <option value="gpt-4o-mini">⚡ ChatGPT-4o-mini</option>
                            </select>
                        </div>
                        <div class="bg-cyan-50 p-4 rounded-xl border border-cyan-200 shadow-sm">
                            <div class="flex flex-col md:flex-row md:justify-between items-start md:items-center mb-2 gap-2">
                                <label class="block text-[11px] md:text-xs font-bold text-cyan-800 tracking-wider uppercase">📋 PM Specification Master List</label>
                                <span id="specStatus" class="text-[9px] bg-green-100 text-green-800 px-2 py-1 rounded-full font-black hidden">✅ Sync</span>
                            </div>
                            <textarea id="pmSpecList" placeholder="Paste Specs here..." class="futu-input text-xs md:text-sm h-20 resize-none" style="font-family: monospace;"></textarea>
                            <button onclick="window.saveSpecsToCloud()" class="mt-3 text-[10px] md:text-xs bg-cyan-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-cyan-700 shadow-md w-full md:w-auto">Update Spec List</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-slate-200">
                            <div class="bg-white p-3 rounded-xl border shadow-sm">
                                <label class="block text-[10px] md:text-[11px] font-bold text-gray-500 mb-1.5 uppercase">📦 INNER Template</label>
                                <input type="file" accept=".docx" onchange="window.loadTemplate(event, 'Inner')" class="w-full text-[10px]">
                                <div id="statusInner" class="text-[9px] md:text-[10px] text-red-500 font-bold mt-1">Missing</div>
                            </div>
                            <div class="bg-white p-3 rounded-xl border shadow-sm">
                                <label class="block text-[10px] md:text-[11px] font-bold text-gray-500 mb-1.5 uppercase">🗃️ OUTER Template</label>
                                <input type="file" accept=".docx" onchange="window.loadTemplate(event, 'Outer')" class="w-full text-[10px]">
                                <div id="statusOuter" class="text-[9px] md:text-[10px] text-red-500 font-bold mt-1">Missing</div>
                            </div>
                        </div>
                    </div>
                </details>

                <div class="bg-white rounded-2xl md:rounded-3xl shadow-lg md:shadow-xl p-4 md:p-8 border border-slate-200 mb-6">
                    <button id="startChatBtn" onclick="window.startAIChat()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-extrabold py-4 md:py-5 rounded-xl md:rounded-2xl shadow-indigo-200 shadow-lg hover:shadow-indigo-500/30 transition-all text-sm md:text-lg flex items-center justify-center gap-2 md:gap-3">🤖 Initialize AI Assistant</button>
                    
                    <div id="chatInterface" class="bg-slate-50 border-2 border-indigo-200 rounded-2xl md:rounded-3xl overflow-hidden mt-4 md:mt-8 hidden shadow-xl shadow-indigo-500/10">
                        <div class="bg-indigo-600 text-white font-bold p-3 md:p-4 text-xs md:text-sm flex justify-between items-center shadow-md">
                            <span class="flex items-center gap-1.5 md:gap-2.5">💬 QC Scanner</span>
                            <div class="flex gap-2">
                                <button onclick="window.clearRulesMemory()" class="text-[9px] md:text-[10px] bg-yellow-400 text-yellow-950 px-2 py-1 md:px-3 md:py-1.5 rounded-full shadow font-bold hidden" id="clearRulesBtn">🧹 Clear Brain</button>
                                <button onclick="window.resetChat()" class="text-[10px] md:text-xs bg-red-500 px-3 py-1 md:px-4 md:py-1.5 rounded-full shadow font-bold">New Scan</button>
                            </div>
                        </div>
                        <div id="chatMessages" class="p-4 md:p-6 h-64 md:h-80 overflow-y-auto flex flex-col gap-3 font-medium text-xs md:text-sm"></div>
                        <div class="p-3 md:p-4 bg-white border-t border-indigo-100">
                            <div id="chatImagePreview" class="text-[9px] md:text-[10px] text-blue-700 font-bold mb-2 hidden flex items-center gap-2 bg-blue-50 p-2 rounded-lg w-max border border-blue-100">
                                📎 <span id="chatImageName" class="truncate max-w-[150px]"></span> 
                                <button onclick="window.removeChatImage()" class="text-red-500 bg-red-100 px-2 py-0.5 rounded-full ml-1">❌</button>
                            </div>
                            <div class="flex gap-2 md:gap-3 items-center">
                                <label for="chatImageInput" class="cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-700 p-2 md:p-3 rounded-xl md:rounded-2xl shadow-sm border border-slate-200 transition" title="Attach Photo">📎</label>
                                <input type="file" id="chatImageInput" accept="image/*" class="hidden" onchange="window.previewChatImage(event)">
                                <input type="text" id="chatInput" placeholder="Photo/Command..." class="flex-1 futu-input text-xs md:text-sm py-2 md:py-3" onkeypress="if(event.key === 'Enter' && !this.disabled) window.sendUserMessage()">
                                <button id="chatSendBtn" onclick="window.sendUserMessage()" class="bg-indigo-600 text-white px-4 md:px-7 py-2 md:py-3 rounded-xl md:rounded-2xl font-extrabold shadow hover:bg-indigo-700 transition active:scale-95 text-xs md:text-sm uppercase tracking-wider shrink-0">Send</button>
                            </div>
                        </div>
                    </div>

                    <div id="resultSection" class="mt-6 md:mt-10 border-t border-slate-200 pt-6 md:pt-8 hidden">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-6 border-b pb-3 border-slate-100 gap-3">
                            <h3 class="text-lg md:text-xl font-extrabold text-slate-900 flex items-center gap-2"><span class="text-green-500">✓</span> Verified QC Data</h3>
                            <button onclick="window.addManualRow()" class="w-full md:w-auto bg-slate-900 text-white text-[10px] md:text-[11px] font-bold px-4 py-2.5 rounded-xl md:rounded-full shadow hover:bg-slate-800 transition active:scale-95">+ Add New Batch</button>
                        </div>

                        <div class="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl border border-slate-200 mb-6 md:mb-8 shadow-sm">
                            <h4 class="text-indigo-900 font-extrabold mb-4 text-xs md:text-sm border-b border-indigo-100 pb-2 tracking-wide uppercase">🌐 Unified GRN Details</h4>
                            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-5">
                                <div class="col-span-2"><label class="block text-[9px] md:text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">Supplier</label><input type="text" id="inpSupplier" class="futu-input text-xs md:text-sm px-2 md:px-3" onchange="window.syncCommonData()"></div>
                                <div class="col-span-2"><label class="block text-[9px] md:text-[11px] font-extrabold text-blue-700 uppercase tracking-wider mb-1">Approval No</label><input type="text" id="inpApprovalNo" class="w-full p-2 border-2 border-blue-300 rounded-xl font-bold text-xs md:text-sm bg-blue-50 focus:border-blue-500 outline-none" style="font-family: monospace;" onchange="window.syncCommonData()"></div>
                                <div class="col-span-2 md:col-span-1"><label class="block text-[9px] md:text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">GRN No</label><input type="text" id="inpGrn" class="futu-input text-xs md:text-sm px-2 md:px-3" style="font-family: monospace;" onchange="window.syncCommonData()"></div>
                                <div><label class="block text-[9px] md:text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">D.C. No</label><input type="text" id="inpDcNo" class="futu-input text-xs md:text-sm px-2 md:px-3" style="font-family: monospace;" onchange="window.syncCommonData()"></div>
                                <div><label class="block text-[9px] md:text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">D.C. Date</label><input type="text" id="inpDcDate" class="futu-input text-xs md:text-sm px-2 md:px-3" style="font-family: monospace;" onchange="window.syncCommonData()"></div>
                            </div>
                        </div>

                        <div id="batchTableBody" class="space-y-6 md:space-y-8 mb-8 md:mb-10"></div>

                        <button onclick="window.saveToDatabase()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-extrabold py-4 md:py-5 rounded-xl md:rounded-2xl shadow-green-200 shadow-xl hover:shadow-green-500/30 transition-all active:scale-95 flex items-center justify-center gap-2 md:gap-3 text-sm md:text-xl uppercase tracking-wider">
                            🚀 SEND TO MASTER DB (PC)
                        </button>
                    </div>
                </div>
            </div>

            <div id="workbookTab" class="hidden">
                <div class="bg-white rounded-2xl md:rounded-3xl shadow-xl p-4 md:p-8 border border-slate-200">
                    <h2 class="text-xl md:text-2xl font-extrabold text-slate-950 mb-2 md:mb-3 border-b pb-2 md:pb-3 border-slate-100 flex items-center gap-2">💻 Master DB <span class="text-[10px] md:text-xs font-medium text-slate-500 hidden md:inline">History Records</span></h2>
                    <p class="text-[10px] md:text-sm text-slate-600 mb-4 md:mb-6 font-medium">Download unified reports by ticking (☑️) specific GRN records.</p>
                    
                    <div class="bg-slate-50 border border-slate-200 p-3 md:p-5 rounded-xl md:rounded-3xl shadow-inner flex flex-col md:flex-row items-start md:items-center gap-3 md:gap-5 justify-between mb-6 md:mb-8">
                        <div class="text-xs md:text-base font-extrabold text-slate-900 tracking-tight">Combine Selected GRNs:</div>
                        <div class="flex flex-row gap-2 md:gap-3 w-full md:w-auto">
                            <button onclick="window.downloadMultipleFromHistory('Inner')" class="flex-1 md:flex-none bg-blue-600 text-white text-[9px] md:text-xs font-bold py-2 md:py-3 px-2 md:px-5 rounded-lg md:rounded-xl shadow active:scale-95 flex items-center justify-center gap-1">📦 Merged INNER</button>
                            <button onclick="window.downloadMultipleFromHistory('Outer')" class="flex-1 md:flex-none bg-purple-600 text-white text-[9px] md:text-xs font-bold py-2 md:py-3 px-2 md:px-5 rounded-lg md:rounded-xl shadow active:scale-95 flex items-center justify-center gap-1">🗃️ Merged OUTER</button>
                        </div>
                    </div>
                    <div id="workbookContainer" class="space-y-4 md:space-y-5">
                        <div class="text-center py-10 md:py-16 text-slate-500 font-semibold bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 text-xs md:text-base">Waiting for scans...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        window.addEventListener("unhandledrejection", function(event) {
            let errorMsg = event.reason ? event.reason.message : "Unknown Promise Error";
            window.showToast("❌ Network/DB Error: " + errorMsg, "error");
            console.error("X-Ray Unhandled Rejection:", event.reason);
        });

        const firebaseConfig = {
            apiKey: "AIzaSyAnt87woppTbR8b1d9cCaqFTQOptf2YGAA",
            authDomain: "salary-tracker-768a9.firebaseapp.com",
            projectId: "salary-tracker-768a9",
            storageBucket: "salary-tracker-768a9.firebasestorage.app",
            messagingSenderId: "533403739591",
            appId: "1:533403739591:web:ceba8d71751b1963fd25e2"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let unsubHistory = null;
        
        window.templates = { Inner: null, Outer: null };
        window.extractedData = null;
        window.historyData = [];
        window.expandedGrnId = null;
        window.memoryTrainingRules = "";
        window.memorySpecList = "";
        
        window.smartChatMemory = [];
        window.chatAttachedImage = null;
        window.isAIGenerating = false;
        window.isImageScan = false; 
        window.abortController = null;

        window.showToast = function(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`; toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 5000);
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userBadge').classList.remove('hidden');
                document.getElementById('currentUserEmail').innerText = user.email;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                await loadSettingsFromCloud(); 
                fetchWorkbook(); 
            } else {
                currentUser = null;
                document.getElementById('userBadge').classList.add('hidden');
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                if(unsubHistory) unsubHistory(); 
            }
        });
        
        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if(!email || pass.length < 6) return alert("Email aur 6 char ka password daalein!");
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (err) {
                if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                    try { await createUserWithEmailAndPassword(auth, email, pass);
                        window.showToast("Naya Admin Account Ban Gaya!", "success"); } catch(e2) { window.showToast("Error: " + e2.message, "error"); }
                } else { window.showToast("Login Error: " + err.message, "error"); }
            }
        };
        
        window.handleLogout = () => signOut(auth);

        window.autoSaveActiveData = async function() {
            if(!currentUser || !window.extractedData) return;
            try { await setDoc(doc(db, 'users', currentUser.uid, 'active_session', 'current_scan'), { data: window.extractedData, updatedAt: Date.now() }); } catch(e) { console.error("Autosave fail", e); }
        };
        
        window.saveApiKeyToCloud = async function() {
            if(!currentUser) return;
            const apiKey = document.getElementById('apiKey').value.trim();
            try {
                await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), { apiKey: apiKey, updatedAt: Date.now() }, { merge: true });
                window.showToast("API Key saved permanently! ✅", "success");
            } catch(e) { 
                window.showToast("DB Error: " + e.message, "error"); 
            }
        };

        window.clearRulesMemory = async function() {
            if(!currentUser) return;
            if(confirm("Confirm: Forget all past instruction history for the AI?")) {
                try {
                    window.memoryTrainingRules = "";
                    await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), { aiTrainingRules: "" }, { merge: true });
                    document.getElementById('clearRulesBtn').classList.add('hidden');
                    window.showToast("AI memory cleared.", "success");
                } catch(e) { window.showToast("DB Error: " + e.message, "error"); }
            }
        };

        window.saveSpecsToCloud = async function() {
            if(!currentUser) return;
            const val = document.getElementById('pmSpecList').value.trim();

        const calculateAQL = (qty) => {
            const getLetter = (q) => {
                if (q <= 8) return ['A','A','A','A','A','A','B'];
                if (q <= 15) return ['A','A','A','A','A','B','C']; if (q <= 25) return ['A','A','B','B','B','C','D'];
                if (q <= 50) return ['A','B','B','C','C','D','E'];
                if (q <= 90) return ['B','B','C','C','C','E','F']; if (q <= 150) return ['B','B','C','D','D','F','G'];
                if (q <= 280) return ['B','C','D','E','E','G','H'];
                if (q <= 500) return ['B','C','D','E','F','H','J']; if (q <= 1200) return ['C','C','E','F','G','J','K']; 
                if (q <= 3200) return ['C','D','E','G','H','K','L'];
                if (q <= 10000) return ['C','D','F','G','J','L','M']; if (q <= 35000) return ['C','D','F','H','K','M','N'];
                if (q <= 150000) return ['D','E','G','J','L','N','P'];
                if (q <= 500000) return ['D','E','G','J','M','P','Q']; return ['D','E','H','K','N','Q','R']; 
            };
            const sizes = { 'A':2, 'B':3, 'C':5, 'D':8, 'E':13, 'F':20, 'G':32, 'H':50, 'J':80, 'K':125, 'L':200, 'M':315, 'N':500, 'P':800, 'Q':1250, 'R':2000 };
            const getPlan = (letter, aql) => {
                const aqlPlans = {
                    '1.0': [ {min: 'A', max: 'E', size: 13, ac: 0}, {min: 'F', max: 'H', size: 50, ac: 1}, {min: 'J', max: 'J', size: 80, ac: 2}, {min: 'K', max: 'K', size: 125, ac: 3}, {min: 'L', max: 'L', size: 200, ac: 5}, {min: 'M', max: 'M', size: 315, ac: 7}, {min: 'N', max: 'N', size: 500, ac: 10}, {min: 'P', max: 'P', size: 800, ac: 14}, {min: 'Q', max: 'R', size: 1250, ac: 21} ],
                    '2.5': [ {min: 'A', max: 'C', size: 5, ac: 0}, {min: 'D', max: 'F', size: 20, ac: 1}, {min: 'G', max: 'G', size: 32, ac: 2}, {min: 'H', max: 'H', size: 50, ac: 3}, {min: 'J', max: 'J', size: 80, ac: 5}, {min: 'K', max: 'K', size: 125, ac: 7}, {min: 'L', max: 'L', size: 200, ac: 10}, {min: 'M', max: 'M', size: 315, ac: 14}, {min: 'N', max: 'R', size: 500, ac: 21} ],
                    '4.0': [ {min: 'A', max: 'B', size: 3, ac: 0}, {min: 'C', max: 'E', size: 13, ac: 1}, {min: 'F', max: 'F', size: 20, ac: 2}, {min: 'G', max: 'G', size: 32, ac: 3}, {min: 'H', max: 'H', size: 50, ac: 5}, {min: 'J', max: 'J', size: 80, ac: 7}, {min: 'K', max: 'K', size: 125, ac: 10}, {min: 'L', max: 'L', size: 200, ac: 14}, {min: 'M', max: 'R', size: 315, ac: 21} ]
                };
                if(aqlPlans[aql]) {
                    const letterCode = letter.charCodeAt(0);
                    for(let plan of aqlPlans[aql]) {
                        if(letterCode >= plan.min.charCodeAt(0) && letterCode <= plan.max.charCodeAt(0)) {
                            return { plan: plan.size, ar: `${plan.ac}/${plan.ac + 1}` };
                        }
                    }
                }
                return { size: sizes[letter], ar: "0/1" };
            };
            const letters = getLetter(qty);
            const lvl1 = getPlan(letters[4], '1.0'); const lvl2 = getPlan(letters[5], '2.5'); const lvl3 = getPlan(letters[6], '4.0');
            return {
                s_s1: sizes[letters[0]], ar_s1: "0/1", s_s2: sizes[letters[1]], ar_s2: "0/1", s_s3: sizes[letters[2]], ar_s3: "0/1", s_s4: sizes[letters[3]], ar_s4: "0/1",
                s_lvl1: lvl1.size || lvl1.plan, ar_lvl1: lvl1.ar, s_lvl2: lvl2.size || lvl2.plan, ar_lvl2: lvl2.ar, s_lvl3: lvl3.size || lvl3.plan, ar_lvl3: lvl3.ar
            };
        };
        
        const getSpec = (brandName, category) => {
            const listStr = window.memorySpecList;
            if (!listStr || listStr.trim() === '') return category === 'Outer' ? "Standard Outer Corrugated Box (As per Master)" : "Standard ITC Cyber XL Board With MET PET, Printing Embossing, Spot UV and UV Coating";
            const lines = listStr.split('\n');
            let lowerBrand = brandName.toLowerCase().trim(); let lowerCat = category.toLowerCase().trim();
            for (let line of lines) {
                let lowerLine = line.toLowerCase();
                if (lowerLine.includes(lowerBrand) && lowerLine.includes(lowerCat)) { let parts = line.split(/[:=-]/); if (parts.length > 1) { parts.shift(); return parts.join(':').trim(); } else return line.trim(); }
            }
            for (let line of lines) {
                let lowerLine = line.toLowerCase();
                if (lowerLine.includes(lowerBrand) && !lowerLine.includes('inner') && !lowerLine.includes('outer')) { let parts = line.split(/[:=-]/); if (parts.length > 1) { parts.shift(); return parts.join(':').trim(); } }
            }
            return category === 'Outer' ? "Standard Outer Corrugated Box (As per Master)" : "Standard ITC Cyber XL Board With MET PET, Printing Embossing, Spot UV and UV Coating";
        };

        window.generateGSMFromTargetAvg = function(batchIndex, targetAvg) {
            let target = parseFloat(targetAvg);
            if(isNaN(target)) return;

            let batch = window.extractedData.batches[batchIndex];
            let count = 9;
            let targetWeight_mg = Math.round(target * 0.625); 
            let offsets = [-4, -3, -2, -1, 0, 1, 2, 3, 4];
            let weights_mg = offsets.map(off => targetWeight_mg + off);

            let targetSumInt = Math.round(target * 9 * 10);
            let loops = 0;

            while(loops < 2000) {
                let cSum = weights_mg.reduce((s, w) => s + parseFloat(((w/1000)/0.625*1000).toFixed(1)), 0);
                let cSumInt = Math.round(cSum * 10);
                if (cSumInt === targetSumInt) break; 
                let freq = {};
                weights_mg.forEach(w => freq[w] = (freq[w]||0)+1);
                let candidates = [0,1,2,3,4,5,6,7,8];
                if (cSumInt < targetSumInt) {
                    candidates.sort((a,b) => (freq[weights_mg[a]+1] || 0) - (freq[weights_mg[b]+1] || 0));
                    weights_mg[candidates[0]] += 1;
                } else {
                    candidates.sort((a,b) => (freq[weights_mg[a]-1] || 0) - (freq[weights_mg[b]-1] || 0));
                    weights_mg[candidates[0]] -= 1;
                }
                loops++;
            }

            for (let i = weights_mg.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [weights_mg[i], weights_mg[j]] = [weights_mg[j], weights_mg[i]];
            }

            let totalGsm = 0;
            for(let i=0; i<9; i++) {
                let strictW = parseFloat((weights_mg[i] / 1000).toFixed(3));
                let strictGsm = parseFloat(((strictW / 0.625) * 1000).toFixed(1));
                window.extractedData.batches[batchIndex][`w${i+1}`] = strictW.toFixed(3);
                window.extractedData.batches[batchIndex][`g${i+1}`] = strictGsm.toFixed(1);
                totalGsm += strictGsm;
            }

            window.extractedData.batches[batchIndex].avg_gsm = (totalGsm / 9).toFixed(1);
            let cat = window.extractedData.batches[batchIndex].category;
            window.extractedData.batches[batchIndex].target_min = cat === 'Outer' ? 365 : 265;
            window.extractedData.batches[batchIndex].target_max = cat === 'Outer' ? 410 : 305;
            
            window.renderBatchTable();
            window.autoSaveActiveData(); 
        };

        const generateInitialGSMMath = (minGSM, maxGSM) => {
            let minG = parseFloat(minGSM); let maxG = parseFloat(maxGSM);
            if(isNaN(minG) || isNaN(maxG)) { minG = 265; maxG = 305; }
            let newTarget = parseFloat((Math.random() * (maxG - minG) + minG).toFixed(1));

                    let fullMsg = `[CURRENT JSON]: ${JSON.stringify(dietData)}\n\nUser Command: ${text}`;
                    apiMessages.push({ role: "user", content: fullMsg });
                }
                
                window.chatAttachedImage = null; document.getElementById('chatImageInput').value = ''; document.getElementById('chatImagePreview').classList.add('hidden'); input.value = ''; 
                window.showTypingIndicator();

                const modelName = document.getElementById('aiModel').value;
                const res = await fetch(`https://models.inference.ai.azure.com/chat/completions`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, 
                    body: JSON.stringify({ model: modelName, messages: apiMessages, temperature: 0.1, max_tokens: 4096 }),
                    signal: window.abortController.signal
                });
                
                if(!res.ok) {
                    if (res.status === 413) throw new Error(`HTTP 413. Payload Too Large.`);
                    throw new Error(`HTTP ${res.status}.`);
                }
                const data = JSON.parse(await res.text()); 
                window.removeTypingIndicator();
                
                const aiText = data.choices[0].message.content;
                let chatResponse = aiText; let rawJson = null;

                let jsonMatch = aiText.match(/```json\n([\s\S]*?)\n```/) || aiText.match(/```\n([\s\S]*?)\n```/);
                if (jsonMatch) { 
                    rawJson = jsonMatch[1]; 
                    chatResponse = aiText.replace(jsonMatch[0], '').trim(); 
                } else if (aiText.includes('"batches"')) { 
                    let bracketMatch = aiText.match(/\{[\s\S]*"batches"[\s\S]*\}/); 
                    if(bracketMatch) { rawJson = bracketMatch[0]; chatResponse = aiText.replace(bracketMatch[0], '').trim(); }
                }

                if (chatResponse && chatResponse.length > 0) window.appendChatMessage(chatResponse, "ai");
                else if (rawJson) window.appendChatMessage("Done bhai! Data update ho gaya.", "ai");
                
                if (rawJson) window.processExtractedJson(rawJson);

            } catch (globalError) {
                window.removeTypingIndicator(); 
                if(globalError.name === 'AbortError') window.appendChatMessage("🛑 Stopped.", "ai");
                else window.appendChatMessage(`❌ Error: ${globalError.message}`, "ai");
            } finally {
                window.isAIGenerating = false; window.abortController = null;
                const input = document.getElementById('chatInput'); const btn = document.getElementById('chatSendBtn');
                if(input && btn) { input.disabled = false; btn.innerHTML = 'Send'; btn.classList.replace('bg-red-600', 'bg-indigo-600'); btn.classList.replace('hover:bg-red-700', 'hover:bg-indigo-700'); setTimeout(()=>input.focus(), 100); }
            }
        }

        // 🔥 FIX: CATEGORY CHANGE HONE PAR GSM RECALCULATE HOGA 🔥
        window.processExtractedJson = function(rawJsonStr) {
            try {
                const info = JSON.parse(rawJsonStr);
                let dietDataPrev = {supplier:window.extractedData?.supplier, grnNo:window.extractedData?.grnNo, count: window.extractedData?.batches?.length || 0};
                let dietDataNew = {supplier:info.supplierName, grnNo:info.grnNo, count: info.batches?.length || 0};

                if (window.isImageScan === false && dietDataPrev.count > 0 && dietDataNew.count < dietDataPrev.count) {
                    window.appendChatMessage("❌ Error: AI ne aalas dikhaya aur kuch lines skip kar di. Maine purana data bacha liya hai. Kripya dubaara try karein.", "ai");
                    window.showToast("Data Wipe blocked by Smart Net!", "error");
                    return; 
                }

                let needsMathCalculation = []; 
                
                const processedBatches = info.batches.map((b, index) => {
                    let oldBatch = (window.isImageScan === false && window.extractedData?.batches && window.extractedData.batches[index]) ? window.extractedData.batches[index] : {};

                    let qty = parseInt(b.receivedQty || b.qty) || oldBatch.qty || 0; 
                    let cat = (b.category || oldBatch.category) === 'Outer' ? 'Outer' : 'Inner';
                    
                    let minG = cat === 'Outer' ? 365 : 265; 
                    let maxG = cat === 'Outer' ? 410 : 305;
                    
                    let finalSpec = b.spec || oldBatch.spec; 
                    if (!finalSpec || finalSpec.length < 5) finalSpec = getSpec(b.brandName || oldBatch.brand, cat);
                    
                    let newTarget = parseFloat(b.avg_gsm);
                    if (isNaN(newTarget)) {
                        // Agar category change hui hai, toh purana GSM bhool jao!
                        let categoryChanged = oldBatch.category && (oldBatch.category.toLowerCase() !== cat.toLowerCase());
                        
                        if (categoryChanged) {
                            newTarget = null;
                        } else {
                            newTarget = oldBatch.avg_gsm ? parseFloat(oldBatch.avg_gsm) : null;
                        }

                        if (!newTarget) {
                            let rMin = cat === 'Outer' ? 365 : 265;
                            let rMax = cat === 'Outer' ? 410 : 305;
                            newTarget = parseFloat((Math.random() * (rMax - rMin) + rMin).toFixed(1));
                        }
                    }

                    let newBatch = { 
                        brand: b.brandName || b.brand || oldBatch.brand || "", 
                        batch: b.batchNo || b.batch || oldBatch.batch || "", 
                        qty: qty, 
                        category: cat, 
                        po_no: b.po_no !== undefined ? b.po_no : (oldBatch.po_no || ""), 
                        po_date: b.po_date !== undefined ? b.po_date : (oldBatch.po_date || ""), 
                        ar_no: b.ar_no !== undefined ? b.ar_no : (oldBatch.ar_no || ""), 
                        ar_date: b.ar_date !== undefined ? b.ar_date : (oldBatch.ar_date || ""), 
                        spec: finalSpec, 
                        target_min: minG, 
                        target_max: maxG, 
                        ...calculateAQL(qty)
                    };
                    
                    if (newTarget) newBatch.avg_gsm = newTarget; 
                    
                    for(let i=1; i<=9; i++) { newBatch[`w${i}`] = "0.000"; newBatch[`g${i}`] = "0.0"; }

                    needsMathCalculation.push({ index: index, target: newBatch.avg_gsm });
                    return newBatch;
                });

                window.extractedData = { 
                    supplier: info.supplierName || window.extractedData?.supplier || "", 
                    approvalNo: info.approvalNo || window.extractedData?.approvalNo || "", 
                    grnNo: info.grnNo || window.extractedData?.grnNo || "", 
                    dcNo: info.dcNo || window.extractedData?.dcNo || "", 
                    dcDate: info.dcDate || window.extractedData?.dcDate || "", 
                    batches: processedBatches 
                };
                
                needsMathCalculation.forEach(item => { window.generateGSMFromTargetAvg(item.index, item.target); });

                window.updateFormUI(); document.getElementById('resultSection').classList.remove('hidden');
                window.autoSaveActiveData();
            } catch(e) { window.appendChatMessage("❌ Failed to parse data.", "ai"); }
        }

            const templateDataUrl = window.templates[targetCategory];

            let allCombinedBatches = [];
            checkboxes.forEach(cb => {
                const recordId = cb.value; const record = window.historyData.find(r => r.id === recordId);

            let ZipConstructor = (typeof window.PizZip !== 'undefined') ? window.PizZip : PizZip;

                const base64Data = templateDataUrl.split(',')[1];

                            <div class="border border-indigo-100 rounded-2xl md:rounded-3xl overflow-hidden mt-2 shadow-sm">
                                <div class="bg-indigo-950 text-indigo-100 text-[10px] md:text-xs font-bold p-3 md:p-4 flex justify-between items-center px-3 md:px-5">
                                    <span class="text-[11px] md:text-sm">GSM Calculations</span>
                                    <button onclick="window.copyHistoryWeights('${record.id}', ${bIdx})" class="bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1 md:px-3 md:py-1.5 rounded-lg shadow font-bold text-[9px] md:text-[10px] active:scale-95 transition flex items-center gap-1">📋 Copy</button>
                                </div>
                                <div class="p-3 md:p-5 font-mono text-xs md:text-sm text-slate-900 space-y-2 bg-white">`;
                        for(let i=1; i<=9; i++) { 
                            html += `
                                <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                                    <span class="w-6 md:w-8 font-extrabold text-slate-500">${i})</span>
                                    <span class="w-16 md:w-20 text-center text-slate-950 font-black text-xs md:text-base" style="font-family:monospace;">${b[`w${i}`]}</span>
                                    <span class="text-slate-400 text-[9px] md:text-xs">/ 0.625 x 1000 = </span>
                                    <span class="font-black text-indigo-700 w-12 md:w-16 text-right text-xs md:text-base" style="font-family:monospace;">${b[`g${i}`]}</span>
                                </div>`;
                        }
                        html += `
                                </div>
                                <div class="bg-emerald-50 text-emerald-900 font-extrabold text-center p-3 md:p-4 text-sm md:text-xl border-t border-emerald-100">
                                    Avg = ${b.avg_gsm}
                                </div>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
                container.innerHTML += html;
            });
        }
        window.toggleExpand = function(id) { window.expandedGrnId = window.expandedGrnId === id ? null : id; renderWorkbook(); }
        window.deleteRecord = async function(id) { 
            if(confirm("Confirm deletion of this GRN history Bhai?")) {
                try {
                    await deleteDoc(doc(db, 'users', currentUser.uid, 'qc_word_history_master', id)); 
                } catch(e) {
                    if(e.code === 'permission-denied') alert("🚨 Cloud Error: Database Permissions missing.");
                    else alert("Error: " + e.message);
                }
            }
        }
    </script>
</body>
</html>
