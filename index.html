<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>UPPL QC Command Center (Final GitHub Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.45.0/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <style>
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { min-width: 250px; padding: 16px; border-radius: 8px; color: white; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); opacity: 0; transform: translateY(-20px); transition: all 0.3s ease; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: #10B981; }
        .toast.error { background-color: #EF4444; }
        .chat-ai { background-color: #f3f4f6; border-color: #d1d5db; color: #1f2937; border-bottom-left-radius: 0; }
        .chat-user { background-color: #eff6ff; border-color: #bfdbfe; color: #1e3a8a; border-bottom-right-radius: 0; align-self: flex-end; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #3b82f6; border-radius: 50%; animation: typing 1s infinite; margin: 0 2px;}
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        .editable-gsm { border-bottom: 2px dashed #6366f1; transition: all 0.2s; background: #eef2ff; border-radius: 4px; padding: 0 4px;}
        .editable-gsm:focus { border-bottom: 2px solid #4f46e5; background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-20 relative">

    <div id="toast-container"></div>

    <div id="userBadge" class="fixed top-4 right-4 bg-gray-900 text-white text-xs font-bold px-3 py-2 rounded-full shadow-lg z-[60] hidden border-2 border-green-400">
        👤 <span id="currentUserEmail">Loading...</span>
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-gray-900 bg-opacity-75 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
            <h2 class="text-2xl font-black text-center text-blue-900 mb-6">UPPL QC ADMIN</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Company ID (Email)</label>
                    <input type="email" id="loginEmail" placeholder="admin@uppl.com" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Password</label>
                    <input type="password" id="loginPass" placeholder="******" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition">
                    Login / Sign Up
                </button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="bg-gray-900 shadow-md sticky top-0 z-50">
            <div class="max-w-4xl mx-auto flex pr-20 md:pr-0">
                <button id="tabScanBtn" onclick="switchTab('scan')" class="flex-1 py-4 font-bold text-center transition bg-gray-800 text-white border-b-4 border-green-400">
                    📝 QC Scanner
                </button>
                <button id="tabWorkbookBtn" onclick="switchTab('workbook')" class="flex-1 py-4 font-bold text-center transition text-gray-400 hover:bg-gray-700">
                    💻 PC View
                </button>
                <button onclick="handleLogout()" class="px-4 py-4 font-bold text-center transition text-red-400 hover:bg-gray-700 text-xs uppercase tracking-wider border-l border-gray-700">
                    Logout
                </button>
            </div>
        </div>

        <div class="max-w-4xl mx-auto mt-6 px-4">
            <div id="scanTab" class="block">
                <details class="bg-white rounded-xl shadow-sm mb-6 border border-gray-200 overflow-hidden">
                    <summary class="bg-gray-800 text-white font-bold p-4 cursor-pointer flex justify-between items-center hover:bg-gray-700 transition">
                        <span>⚙️ Settings (GitHub Free API)</span>
                        <span class="text-xs bg-green-500 text-white px-2 py-1 rounded">System OK</span>
                    </summary>
                    <div class="p-6 space-y-6 bg-gray-50">
                        <div class="bg-white p-4 rounded border shadow-sm">
                            <label class="block text-xs font-bold text-gray-600 mb-1">🔑 GitHub API Key</label>
                            <input type="password" id="apiKey" onchange="saveApiKeyToCloud()" placeholder="github_pat_..." class="w-full text-sm bg-gray-50 p-2 border rounded font-mono mb-2">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-3 border rounded shadow-sm">
                                <label class="block text-[10px] font-bold text-gray-500 mb-1">📦 INNER Template</label>
                                <input type="file" accept=".docx" onchange="loadTemplate(event, 'Inner')" class="w-full text-[10px]">
                                <div id="statusInner" class="text-[10px] text-red-500 font-bold mt-1">Missing</div>
                            </div>
                            <div class="bg-white p-3 border rounded shadow-sm">
                                <label class="block text-[10px] font-bold text-gray-500 mb-1">🗃️ OUTER Template</label>
                                <input type="file" accept=".docx" onchange="loadTemplate(event, 'Outer')" class="w-full text-[10px]">
                                <div id="statusOuter" class="text-[10px] text-red-500 font-bold mt-1">Missing</div>
                            </div>
                        </div>
                    </div>
                </details>

                <div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-gray-800">
                    <div id="chatInterface" class="bg-gray-50 border-2 border-gray-300 rounded-xl overflow-hidden shadow-lg">
                        <div class="bg-gray-800 text-white font-bold p-3 text-sm flex justify-between items-center shadow">
                            <span class="flex items-center gap-2">💬 AI Command Center</span>
                            <button onclick="resetChat()" class="text-xs bg-red-500 hover:bg-red-600 px-3 py-1 rounded shadow">Reset Chat</button>
                        </div>
                        <div id="chatMessages" class="p-4 h-72 overflow-y-auto flex flex-col gap-3"></div>
                        <div class="p-3 bg-white border-t border-gray-200">
                            <div id="chatImagePreview" class="text-[10px] text-gray-600 font-bold mb-2 hidden flex items-center gap-2 bg-gray-100 p-1 rounded w-max">
                                📎 Attached: <span id="chatImageName"></span> 
                                <button onclick="removeChatImage()" class="text-red-500 bg-red-100 px-2 py-0.5 rounded ml-2">❌</button>
                            </div>
                            <div class="flex gap-2 items-center">
                                <label for="chatImageInput" class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-700 p-2.5 rounded-lg shadow-sm border border-gray-300 transition" title="Attach Form Photo">📎</label>
                                <input type="file" id="chatImageInput" accept="image/*" class="hidden" onchange="previewChatImage(event)">
                                <input type="text" id="chatInput" placeholder="Message or Command..." class="flex-1 p-2 border-2 border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500 font-medium disabled:bg-gray-200 disabled:text-gray-500" onkeypress="if(event.key === 'Enter' && !this.disabled) handleChatAction()">
                                <button id="chatSendBtn" onclick="handleChatAction()" class="bg-gray-800 text-white px-5 rounded-lg font-black shadow hover:bg-gray-900 transition text-sm min-w-[80px] flex items-center justify-center h-10">Send</button>
                            </div>
                        </div>
                    </div>

                    <div id="resultSection" class="mt-8 border-t-2 pt-6 hidden">
                        <div class="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 class="text-lg font-black text-green-700">✅ Extracted Data</h3>
                            <button onclick="addManualRow()" class="bg-gray-800 text-white text-xs px-3 py-2 rounded shadow hover:bg-gray-700">+ Add Manual Row</button>
                        </div>

                        <div class="bg-gray-100 p-4 rounded-xl border-2 border-gray-300 mb-6 shadow-sm">
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div class="col-span-2"><label class="block text-[10px] font-bold text-gray-500 uppercase">Supplier Name</label><input type="text" id="inpSupplier" class="w-full p-2 border rounded font-bold text-sm bg-white" onchange="syncCommonData()"></div>
                                <div class="col-span-2"><label class="block text-[10px] font-bold text-blue-600 uppercase">Approval Number</label><input type="text" id="inpApprovalNo" class="w-full p-2 border border-blue-300 rounded font-bold text-sm bg-blue-50" placeholder="e.g. 016P" onchange="syncCommonData()"></div>
                                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">GRN No.</label><input type="text" id="inpGrn" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">D.C. No</label><input type="text" id="inpDcNo" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">D.C. Date</label><input type="text" id="inpDcDate" class="w-full p-2 border rounded font-mono text-sm" onchange="syncCommonData()"></div>
                            </div>
                        </div>

                        <div id="batchTableBody" class="space-y-6 mb-8"></div>

                        <button onclick="saveToDatabase()" class="w-full bg-green-600 text-white font-black py-5 rounded-xl shadow-lg hover:bg-green-700 transition flex items-center justify-center gap-2 text-xl">
                            🚀 SEND DATA TO PC (HISTORY)
                        </button>
                    </div>
                </div>
            </div>

            <div id="workbookTab" class="hidden">
                <div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-green-500">
                    <h2 class="text-2xl font-black text-gray-800 mb-2 border-b pb-2">💻 PC View (Master Data)</h2>
                    <div class="bg-gray-50 border border-gray-200 p-4 rounded-xl shadow-sm flex flex-col md:flex-row items-center gap-4 justify-between mb-6">
                        <div class="text-sm font-black text-gray-900">Combine Selected GRNs:</div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="downloadMultipleFromHistory('Inner')" class="flex-1 md:flex-none bg-blue-500 text-white text-xs font-bold py-2.5 px-4 rounded-lg shadow hover:bg-blue-600 transition">📦 Merge INNER</button>
                            <button onclick="downloadMultipleFromHistory('Outer')" class="flex-1 md:flex-none bg-purple-500 text-white text-xs font-bold py-2.5 px-4 rounded-lg shadow hover:bg-purple-600 transition">🗃️ Merge OUTER</button>
                        </div>
                    </div>
                    <div id="workbookContainer" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnt87woppTbR8b1d9cCaqFTQOptf2YGAA",
            authDomain: "salary-tracker-768a9.firebaseapp.com",
            projectId: "salary-tracker-768a9",
            storageBucket: "salary-tracker-768a9.firebasestorage.app",
            messagingSenderId: "533403739591",
            appId: "1:533403739591:web:ceba8d71751b1963fd25e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let unsubHistory = null;

        window.templates = { Inner: null, Outer: null };
        window.extractedData = null;
        window.historyData = [];
        window.expandedGrnId = null;
        window.chatAttachedImage = null; 
        window.abortController = null;
        window.isAIGenerating = false; 
        window.conversationMemory = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userBadge').classList.remove('hidden');
                document.getElementById('currentUserEmail').innerText = user.email;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                await loadSettingsFromCloud(); 
                fetchWorkbook(); 
            } else {
                currentUser = null;
                document.getElementById('userBadge').classList.add('hidden');
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                if(unsubHistory) unsubHistory(); 
            }
        });

        // 🔥 STRICT LOGIN FIX: Alert pop-ups for clarity
        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            
            if(!email || pass.length < 6) {
                alert("⚠️ Error: Email sahi daalein aur password kam se kam 6 letter ka hona chahiye.");
                return;
            }
            
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
            } catch (err) {
                if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/invalid-login-credentials') {
                    try { 
                        await createUserWithEmailAndPassword(auth, email, pass); 
                        alert("✅ Naya Account Ban Gaya! Login Done.");
                    } catch(e2) { 
                        alert("❌ SIGNUP ERROR: " + e2.message); 
                    }
                } else { 
                    alert("❌ LOGIN ERROR: " + err.message); 
                }
            }
        };

        window.handleLogout = () => signOut(auth);

        window.saveApiKeyToCloud = async function() {
            if(!currentUser) return;
            const apiKey = document.getElementById('apiKey').value.trim();
            await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), { githubApiKey: apiKey, updatedAt: Date.now() }, { merge: true });
        };

        window.saveTemplatesToCloud = async function() {
            if(!currentUser) return;
            await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), {
                innerTemplateBase64: window.templates.Inner || null,
                outerTemplateBase64: window.templates.Outer || null
            }, { merge: true });
        };

        window.loadTemplate = function(event, type) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                window.templates[type] = e.target.result;
                const statusEl = document.getElementById('status' + type);
                statusEl.innerText = "✓ Ready to use"; statusEl.className = "text-[10px] text-green-600 font-bold mt-1";
                saveTemplatesToCloud();
            };
            reader.readAsDataURL(file);
        };

        async function loadSettingsFromCloud() {
            if(!currentUser) return;
            try {
                const snap = await getDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'));
                if(snap.exists()) {
                    const data = snap.data();
                    if(data.githubApiKey) document.getElementById('apiKey').value = data.githubApiKey;
                    if(data.innerTemplateBase64) { window.templates.Inner = data.innerTemplateBase64; document.getElementById('statusInner').innerText = "✓ Ready"; document.getElementById('statusInner').className = "text-[10px] text-green-600 font-bold mt-1"; }
                    if(data.outerTemplateBase64) { window.templates.Outer = data.outerTemplateBase64; document.getElementById('statusOuter').innerText = "✓ Ready"; document.getElementById('statusOuter').className = "text-[10px] text-green-600 font-bold mt-1"; }
                }
                startAIChat(false);
            } catch(e) { console.error("Settings load error", e); }
        }

        const calculateAQL = (qty) => {
            const getLetter = (q) => {
                if (q <= 8) return ['A','A','A','A','A','A','B']; if (q <= 15) return ['A','A','A','A','A','B','C']; if (q <= 25) return ['A','A','B','B','B','C','D'];
                if (q <= 50) return ['A','B','B','C','C','D','E']; if (q <= 90) return ['B','B','C','C','C','E','F']; if (q <= 150) return ['B','B','C','D','D','F','G'];
                if (q <= 280) return ['B','C','D','E','E','G','H']; if (q <= 500) return ['B','C','D','E','F','H','J']; if (q <= 1200) return ['C','C','E','F','G','J','K']; 
                if (q <= 3200) return ['C','D','E','G','H','K','L']; if (q <= 10000) return ['C','D','F','G','J','L','M']; if (q <= 35000) return ['C','D','F','H','K','M','N'];
                if (q <= 150000) return ['D','E','G','J','L','N','P']; if (q <= 500000) return ['D','E','G','J','M','P','Q']; return ['D','E','H','K','N','Q','R']; 
            };
            const sizes = { 'A':2, 'B':3, 'C':5, 'D':8, 'E':13, 'F':20, 'G':32, 'H':50, 'J':80, 'K':125, 'L':200, 'M':315, 'N':500, 'P':800, 'Q':1250, 'R':2000 };
            const getPlan = (letter, aql) => {
                const aqlPlans = {
                    '1.0': [ {min: 'A', max: 'E', size: 13, ac: 0}, {min: 'F', max: 'H', size: 50, ac: 1}, {min: 'J', max: 'J', size: 80, ac: 2}, {min: 'K', max: 'K', size: 125, ac: 3}, {min: 'L', max: 'L', size: 200, ac: 5}, {min: 'M', max: 'M', size: 315, ac: 7}, {min: 'N', max: 'N', size: 500, ac: 10}, {min: 'P', max: 'P', size: 800, ac: 14}, {min: 'Q', max: 'R', size: 1250, ac: 21} ],
                    '2.5': [ {min: 'A', max: 'C', size: 5, ac: 0}, {min: 'D', max: 'F', size: 20, ac: 1}, {min: 'G', max: 'G', size: 32, ac: 2}, {min: 'H', max: 'H', size: 50, ac: 3}, {min: 'J', max: 'J', size: 80, ac: 5}, {min: 'K', max: 'K', size: 125, ac: 7}, {min: 'L', max: 'L', size: 200, ac: 10}, {min: 'M', max: 'M', size: 315, ac: 14}, {min: 'N', max: 'R', size: 500, ac: 21} ],
                    '4.0': [ {min: 'A', max: 'B', size: 3, ac: 0}, {min: 'C', max: 'E', size: 13, ac: 1}, {min: 'F', max: 'F', size: 20, ac: 2}, {min: 'G', max: 'G', size: 32, ac: 3}, {min: 'H', max: 'H', size: 50, ac: 5}, {min: 'J', max: 'J', size: 80, ac: 7}, {min: 'K', max: 'K', size: 125, ac: 10}, {min: 'L', max: 'L', size: 200, ac: 14}, {min: 'M', max: 'R', size: 315, ac: 21} ]
                };
                if(aqlPlans[aql]) {
                    const letterCode = letter.charCodeAt(0);
                    for(let plan of aqlPlans[aql]) {
                        if(letterCode >= plan.min.charCodeAt(0) && letterCode <= plan.max.charCodeAt(0)) { return { plan: plan.size, ar: `${plan.ac}/${plan.ac + 1}` }; }
                    }
                }
                return { size: sizes[letter], ar: "0/1" };
            };
            const letters = getLetter(qty);
            const lvl1 = getPlan(letters[4], '1.0'); const lvl2 = getPlan(letters[5], '2.5'); const lvl3 = getPlan(letters[6], '4.0'); 
            return {
                s_s1: sizes[letters[0]], ar_s1: "0/1", s_s2: sizes[letters[1]], ar_s2: "0/1", s_s3: sizes[letters[2]], ar_s3: "0/1", s_s4: sizes[letters[3]], ar_s4: "0/1",
                s_lvl1: lvl1.size || lvl1.plan, ar_lvl1: lvl1.ar, s_lvl2: lvl2.size || lvl2.plan, ar_lvl2: lvl2.ar, s_lvl3: lvl3.size || lvl3.plan, ar_lvl3: lvl3.ar
            };
        };

        const getSpec = (brandName, category) => {
            return category === 'Outer' ? "Standard Outer Corrugated Box (As per Master)" : "Standard ITC Cyber XL Board With MET PET, Printing Embossing, Spot UV and UV Coating";
        };

        // 🔥 PERFECT MATH: Strict Boundaries & 100% Natural Randomization
        const generateGSMMath = (minGSM, maxGSM, cat) => {
            let mathObj = {}; 
            let minG = parseFloat(minGSM); 
            let maxG = parseFloat(maxGSM);
            
            // Failsafe limit setup
            if(isNaN(minG) || isNaN(maxG) || minG >= maxG) { 
                minG = (cat === 'Outer' || cat === 'outer') ? 350 : 253; 
                maxG = (cat === 'Outer' || cat === 'outer') ? 355 : 255; 
            }

            let exactCenter = (minG + maxG) / 2;
            let variationRange = (maxG - minG) * 0.4;
            // Generate a natural average that shifts around the center for each batch
            let randomShift = (Math.random() * variationRange) - (variationRange / 2);
            let targetAvg = exactCenter + randomShift;

            let baseWeightStr = ((targetAvg * 0.625) / 1000).toFixed(3);
            let baseWeight = parseFloat(baseWeightStr);

            let variances = [0.001, -0.001, 0.002, -0.002, 0.003, -0.003, 0.001, -0.001, 0];
            // Shuffle variations to avoid identical patterns
            for (let i = variances.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [variances[i], variances[j]] = [variances[j], variances[i]];
            }

            let totalGsm = 0;
            for(let i=0; i<9; i++) {
                let wVal = parseFloat((baseWeight + variances[i]).toFixed(3));
                let finalGsm = parseFloat(((wVal / 0.625) * 1000).toFixed(1));

                // 🛑 STRICT LIMIT ENFORCEMENT 🛑
                if (finalGsm < minG) {
                    finalGsm = minG + 0.1; // Keep it slightly above absolute minimum
                    wVal = parseFloat(((finalGsm * 0.625)/1000).toFixed(3)); // Re-sync weight
                }
                if (finalGsm > maxG) {
                    finalGsm = maxG - 0.1; // Keep it slightly below absolute maximum
                    wVal = parseFloat(((finalGsm * 0.625)/1000).toFixed(3)); // Re-sync weight
                }

                mathObj[`w${i+1}`] = wVal.toFixed(3);
                mathObj[`g${i+1}`] = finalGsm.toFixed(1);
                totalGsm += finalGsm;
            }
            
            mathObj.avg_gsm = (totalGsm / 9).toFixed(1);
            mathObj.target_min = minG; 
            mathObj.target_max = maxG;
            return mathObj;
        };

        window.updateManualWeight = function(batchIndex, sampleIndex, newWeightValue) {
            let weight = parseFloat(newWeightValue);
            if (isNaN(weight)) return;
            let gsm = (weight / 0.625) * 1000;
            window.extractedData.batches[batchIndex][`w${sampleIndex}`] = weight.toFixed(3);
            window.extractedData.batches[batchIndex][`g${sampleIndex}`] = gsm.toFixed(1);
            let totalGsm = 0;
            for(let i=1; i<=9; i++) { totalGsm += parseFloat(window.extractedData.batches[batchIndex][`g${i}`] || 0); }
            window.extractedData.batches[batchIndex].avg_gsm = (totalGsm / 9).toFixed(1);
            renderBatchTable(); 
        };

        window.copyWeights = function(batchIndex) {
            if(!window.extractedData || !window.extractedData.batches[batchIndex]) return;
            let b = window.extractedData.batches[batchIndex];
            let textToCopy = "";
            for(let i=1; i<=9; i++) { textToCopy += (b['w'+i] || '') + "\n"; }
            navigator.clipboard.writeText(textToCopy.trim()).then(() => showToast("📋 9 Weights Copied!", "success")).catch(err => alert("Copy fail: " + err));
        }

        window.showToast = function(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`; toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        window.switchTab = function(tabName) {
            document.getElementById('scanTab').classList.toggle('hidden', tabName !== 'scan');
            document.getElementById('workbookTab').classList.toggle('hidden', tabName !== 'workbook');
            const scanBtn = document.getElementById('tabScanBtn'); const wbBtn = document.getElementById('tabWorkbookBtn');
            if(tabName === 'scan') {
                scanBtn.className = "flex-1 py-4 font-bold text-center transition bg-gray-800 text-white border-b-4 border-green-400";
                wbBtn.className = "flex-1 py-4 font-bold text-center transition text-gray-400 hover:bg-gray-700";
            } else {
                wbBtn.className = "flex-1 py-4 font-bold text-center transition bg-gray-800 text-white border-b-4 border-green-400";
                scanBtn.className = "flex-1 py-4 font-bold text-center transition text-gray-400 hover:bg-gray-700";
            }
        }

        function appendChatMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            const isAI = sender === 'ai';
            div.className = `max-w-[85%] p-3 rounded-2xl shadow-sm text-sm border font-medium whitespace-pre-wrap ${isAI ? 'chat-ai' : 'chat-user'}`;
            div.innerText = text;
            container.appendChild(div); container.scrollTop = container.scrollHeight;
        }

        function showTypingIndicator() {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div'); div.id = 'typingIndicator';
            div.className = `max-w-[85%] p-3 rounded-2xl shadow-sm text-sm border chat-ai flex items-center gap-1`;
            div.innerHTML = `<span class="text-blue-500 font-bold mr-1">AI Process Kar Raha Hai</span> <div class="typing-indicator"><span></span><span></span><span></span></div>`;
            container.appendChild(div); container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() { const el = document.getElementById('typingIndicator'); if(el) el.remove(); }

        window.resetChat = async function() {
            if(window.isAIGenerating && window.abortController) window.abortController.abort();
            window.extractedData = null;
            window.conversationMemory = []; 
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('resultSection').classList.add('hidden');
            startAIChat(true); 
        }

        window.previewChatImage = function(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                window.chatAttachedImage = evt.target.result.split(',')[1]; 
                document.getElementById('chatImageName').innerText = file.name;
                document.getElementById('chatImagePreview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        window.removeChatImage = function() {
            window.chatAttachedImage = null; document.getElementById('chatImageInput').value = '';
            document.getElementById('chatImagePreview').classList.add('hidden');
        }

        window.startAIChat = async function(isManualReset = false) {
            if(isManualReset) {
                document.getElementById('chatMessages').innerHTML = ''; 
                window.extractedData = null;
                window.conversationMemory = [];
                document.getElementById('resultSection').classList.add('hidden');
                updateFormUI();
            }
            appendChatMessage(`System Ready ✅\n- GitHub Free API Active.\n- Strict Boundary Math ON.\n- Login Fixed.`, "ai");
        }

        window.handleChatAction = function() {
            if(window.isAIGenerating) {
                if(window.abortController) window.abortController.abort(); 
                return;
            }
            sendUserMessage();
        }

        window.sendUserMessage = async function() {
            const input = document.getElementById('chatInput'); 
            const btn = document.getElementById('chatSendBtn');
            const text = input.value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            
            if(!text && !window.chatAttachedImage) return; 
            if(!apiKey || !apiKey.startsWith('github_pat_')) return alert("API Key Check Karein (github_pat_...)");
            
            input.disabled = true;
            btn.innerHTML = '⏳...';
            window.isAIGenerating = true;
            window.abortController = new AbortController();

            setTimeout(() => {
                if(window.isAIGenerating) {
                    btn.innerHTML = '🛑 Stop';
                    btn.classList.replace('bg-gray-800', 'bg-red-600');
                    btn.classList.replace('hover:bg-gray-900', 'hover:bg-red-700');
                }
            }, 500);

            if (window.chatAttachedImage) { 
                appendChatMessage(text ? text + " [📎 Form Attached]" : "[📎 Form Attached]", "user"); 
            } else { 
                appendChatMessage(text, "user"); 
            }

            const systemPrompt = `You are a strict data processor.
ONLY output raw JSON exactly in this structure:
\`\`\`json
{"supplierName": "...", "approvalNo": "...", "grnNo": "...", "dcNo": "...", "dcDate": "...", "batches": [ { "brandName": "...", "batchNo": "...", "receivedQty": "...", "category": "Inner or Outer", "po_no": "...", "po_date": "...", "ar_no": "...", "ar_date": "...", "target_min_gsm": 253, "target_max_gsm": 255, "spec": "..." } ] }
\`\`\`
CRITICAL RULES:
1. 'target_min_gsm' and 'target_max_gsm' MUST always exist as valid numbers in the JSON. Never omit them. Default Inner=253/255, Outer=350/355.
2. Remember previous JSON context. Only change fields the user explicitly requested to edit.`;

            let openaiMessages = [ { role: "system", content: systemPrompt } ];

            window.conversationMemory.forEach(msg => { openaiMessages.push(msg); });

            let newPromptForMemory = "";

            if (window.chatAttachedImage) {
                openaiMessages.push({
                    role: "user",
                    content: [
                        { type: "text", text: text || "Extract all details into JSON format. Include target boundaries." },
                        { type: "image_url", image_url: { url: "data:image/jpeg;base64," + window.chatAttachedImage } }
                    ]
                });
                newPromptForMemory = (text || "Extracted form data.") + " [Image processed]";
            } else {
                let currentDataStr = window.extractedData ? JSON.stringify(window.extractedData) : "No data.";
                let fullTextPrompt = `[CURRENT JSON]:\n${currentDataStr}\n\nUSER COMMAND: ${text}`;
                openaiMessages.push({ role: "user", content: fullTextPrompt });
                newPromptForMemory = fullTextPrompt;
            }

            window.conversationMemory.push({ role: "user", content: newPromptForMemory });
            window.chatAttachedImage = null; 
            document.getElementById('chatImageInput').value = '';
            document.getElementById('chatImagePreview').classList.add('hidden');
            input.value = ''; 
            showTypingIndicator();

            try {
                // Using GitHub's API endpoint correctly
                const res = await fetch(`https://models.inference.ai.azure.com/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: "gpt-4o", messages: openaiMessages, temperature: 0.1 }),
                    signal: window.abortController.signal
                });
                
                if(!res.ok) throw new Error((await res.json()).error?.message || "API connection failed");
                const data = await res.json(); 
                removeTypingIndicator();
                const aiText = data.choices[0].message.content;
                
                let chatResponse = aiText; 
                let jsonMatch = aiText.match(/```json\n([\s\S]*?)\n```/) || aiText.match(/```\n([\s\S]*?)\n```/); 
                let rawJson = jsonMatch ? jsonMatch[1] : null;
                
                if (jsonMatch) { 
                    chatResponse = aiText.replace(jsonMatch[0], '').trim(); 
                } else if (aiText.includes('"batches"')) { 
                    try { 
                        let bracketMatch = aiText.match(/\{[\s\S]*"batches"[\s\S]*\}/); 
                        if(bracketMatch) { rawJson = bracketMatch[0]; chatResponse = aiText.replace(bracketMatch[0], '').trim(); } 
                    } catch(e){} 
                }

                window.conversationMemory.push({ role: "assistant", content: rawJson ? "JSON updated." : chatResponse });

                if (chatResponse.length > 0) appendChatMessage(chatResponse, "ai"); 
                else if (rawJson) appendChatMessage("adi papa bhai, done! ✅", "ai");
                
                if (rawJson) processExtractedJson(rawJson);
            } catch (e) { 
                removeTypingIndicator(); 
                if(e.name === 'AbortError') appendChatMessage("🛑 Stopped.", "ai");
                else appendChatMessage("❌ Error: " + e.message, "ai"); 
            } finally {
                window.isAIGenerating = false;
                window.abortController = null;
                if(input && btn) {
                    input.disabled = false;
                    btn.innerHTML = 'Send';
                    btn.classList.replace('bg-red-600', 'bg-gray-800');
                    btn.classList.replace('hover:bg-red-700', 'hover:bg-gray-900');
                    setTimeout(() => input.focus(), 100);
                }
            }
        }

        function processExtractedJson(rawJsonStr) {
            try {
                const info = JSON.parse(rawJsonStr);
                const processedBatches = info.batches.map(b => {
                    let qty = parseInt(b.receivedQty) || 0; let cat = (b.category === 'Outer' || b.category === 'outer') ? 'Outer' : 'Inner';
                    
                    let minG = parseFloat(b.target_min_gsm); let maxG = parseFloat(b.target_max_gsm);
                    if(isNaN(minG) || minG <= 0) minG = (cat === 'Outer') ? 350 : 253;
                    if(isNaN(maxG) || maxG <= 0) maxG = (cat === 'Outer') ? 355 : 255;
                    
                    let finalSpec = b.spec || getSpec(b.brandName, cat);
                    let generatedMath = generateGSMMath(minG, maxG, cat);
                    
                    return { brand: b.brandName || "", batch: b.batchNo || "", qty, category: cat, po_no: b.po_no || "", po_date: b.po_date || "", ar_no: b.ar_no || "", ar_date: b.ar_date || "", spec: finalSpec, target_min: generatedMath.target_min, target_max: generatedMath.target_max, ...calculateAQL(qty), ...generatedMath };
                });
                window.extractedData = { supplier: info.supplierName || "", approvalNo: info.approvalNo || "", grnNo: info.grnNo || "", dcNo: info.dcNo || "", dcDate: info.dcDate || "", batches: processedBatches };
                updateFormUI(); document.getElementById('resultSection').classList.remove('hidden');
            } catch(e) { appendChatMessage("❌ JSON Data Error.", "ai"); }
        }

        window.syncCommonData = function() {
            if(!window.extractedData) return; window.extractedData.supplier = document.getElementById('inpSupplier').value; window.extractedData.approvalNo = document.getElementById('inpApprovalNo').value; 
            window.extractedData.grnNo = document.getElementById('inpGrn').value; window.extractedData.dcNo = document.getElementById('inpDcNo').value; window.extractedData.dcDate = document.getElementById('inpDcDate').value;
        };

        function updateFormUI() {
            if(!window.extractedData) return; const d = window.extractedData;
            document.getElementById('inpSupplier').value = d.supplier; document.getElementById('inpApprovalNo').value = d.approvalNo || ""; document.getElementById('inpGrn').value = d.grnNo; document.getElementById('inpDcNo').value = d.dcNo; document.getElementById('inpDcDate').value = d.dcDate;
            renderBatchTable();
        }

        window.addManualRow = function() {
            if(!window.extractedData) window.extractedData = { supplier: "", approvalNo: "", grnNo: "", dcNo: "", dcDate: "", batches: [] };
            let tempMath = generateGSMMath(253, 255, 'Inner');
            window.extractedData.batches.push({ brand: "New Item", batch: "LF001/25", qty: 700, category: 'Inner', po_no: "", po_date: "", ar_no: "", ar_date: "", spec: getSpec("New Item", 'Inner'), target_min: tempMath.target_min, target_max: tempMath.target_max, ...calculateAQL(700), ...tempMath });
            renderBatchTable(); document.getElementById('resultSection').classList.remove('hidden');
        }

        function renderBatchTable() {
            const tbody = document.getElementById('batchTableBody'); tbody.innerHTML = '';
            window.extractedData.batches.forEach((b, i) => {
                let isInner = b.category === 'Inner'; let gsmLinesHtml = '';
                for(let k=1; k<=9; k++) {
                    gsmLinesHtml += `
                    <div class="flex justify-between items-center border-b border-gray-200 pb-1.5">
                        <span class="w-8 font-bold text-gray-500 select-none pointer-events-none">${k})</span>
                        <input type="number" step="0.001" value="${b['w'+k]}" onchange="updateManualWeight(${i}, ${k}, this.value)" class="editable-gsm w-20 text-center font-black text-black text-base bg-transparent" title="Edit Weight">
                        <span class="text-gray-400 text-xs select-none pointer-events-none">/ 0.625 x 1000 = </span>
                        <input type="number" step="0.1" value="${b['g'+k]}" class="editable-gsm font-black text-indigo-700 w-24 text-right text-base" title="Edit GSM" readonly>
                    </div>`;
                }
                tbody.innerHTML += `
                    <div class="bg-white border border-gray-300 shadow-lg rounded-lg p-5 relative overflow-hidden transition-all hover:shadow-xl">
                        <div class="absolute top-0 left-0 ${isInner ? 'bg-blue-800' : 'bg-purple-800'} text-white px-4 py-1 rounded-br-xl text-[10px] font-black uppercase tracking-wider shadow-md">📄 Page ${i+1} Preview (${b.category})</div>
                        <button onclick="removeBatch(${i})" class="absolute top-2 right-2 text-white bg-red-500 hover:bg-red-600 px-3 py-1 rounded shadow-sm text-[10px] font-bold z-10">🗑️ Remove</button>
                        <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4 border-b border-gray-200 pb-4">
                            <div><label class="block text-[10px] text-gray-500 font-bold uppercase mb-1">Brand Name</label><input type="text" value="${b.brand}" onchange="updateBatch(${i}, 'brand', this.value)" class="w-full border-b-2 border-gray-300 p-1 font-black text-xl text-gray-800 focus:border-blue-500 outline-none"></div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="block text-[10px] text-blue-600 font-bold uppercase mb-1">Batch Number</label><input type="text" value="${b.batch}" onchange="updateBatch(${i}, 'batch', this.value)" class="w-full border-2 border-blue-200 p-2 rounded text-lg font-mono font-bold text-blue-900 bg-blue-50"></div>
                                <div><label class="block text-[10px] text-green-600 font-bold uppercase mb-1">Quantity</label><input type="number" value="${b.qty}" onchange="updateBatch(${i}, 'qty', this.value)" class="w-full border-2 border-green-200 p-2 rounded text-lg font-mono font-bold text-green-900 bg-green-50"></div>
                            </div>
                        </div>
                        <div class="pt-4 grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="col-span-2 md:col-span-4 mt-4 border rounded-lg overflow-hidden shadow-sm">
                                <div class="bg-gray-800 text-white text-xs font-bold p-2 flex justify-between items-center px-4">
                                    <div class="flex items-center gap-2">
                                        <span>Target Limits & Weights</span>
                                        <button onclick="copyWeights(${i})" class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-0.5 rounded shadow text-[10px] flex items-center gap-1 active:scale-95 transition" title="Copy 9 weights">📋 Copy</button>
                                    </div>
                                    <div class="flex gap-2 items-center">
                                        <label class="text-[9px] text-gray-300">MIN</label><input type="number" value="${b.target_min}" onchange="updateBatch(${i}, 'target_min', this.value)" class="w-14 bg-gray-700 border border-gray-500 rounded px-1 py-0.5 text-center text-white outline-none focus:border-yellow-400">
                                        <label class="text-[9px] text-gray-300">MAX</label><input type="number" value="${b.target_max}" onchange="updateBatch(${i}, 'target_max', this.value)" class="w-14 bg-gray-700 border border-gray-500 rounded px-1 py-0.5 text-center text-white outline-none focus:border-yellow-400">
                                    </div>
                                </div>
                                <div class="p-3 font-mono text-xs text-gray-600 space-y-1 bg-gray-50">${gsmLinesHtml}</div>
                                <div class="bg-green-100 text-green-800 font-black text-center p-3 text-lg border-t border-green-200 shadow-inner">Calculated Average = ${b.avg_gsm} GSM</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.updateBatch = function(index, field, value) {
            window.extractedData.batches[index][field] = value;
            if(field === 'qty') Object.assign(window.extractedData.batches[index], calculateAQL(parseInt(value)||0));
            
            if(field === 'target_min' || field === 'target_max' || field === 'category') {
                let b = window.extractedData.batches[index];
                if(field === 'category') b.spec = getSpec(b.brandName, b.category);
                let minG = parseFloat(b.target_min); let maxG = parseFloat(b.target_max);
                let tempMath = generateGSMMath(minG, maxG, b.category);
                Object.assign(window.extractedData.batches[index], tempMath);
            }
            renderBatchTable();
        }

        window.removeBatch = function(index) { 
            window.extractedData.batches.splice(index, 1); 
            renderBatchTable(); 
        }

        window.saveToDatabase = async function() {
            if(!currentUser || !window.extractedData) return;
            syncCommonData();
            try {
                const commonDetails = { supplier: window.extractedData.supplier || "", approvalNo: window.extractedData.approvalNo || "", grnNo: window.extractedData.grnNo || "", dcNo: window.extractedData.dcNo || "", dcDate: window.extractedData.dcDate || "" };
                await addDoc(collection(db, 'users', currentUser.uid, 'qc_word_history_master'), { timestamp: Date.now(), dateStr: new Date().toLocaleDateString('en-IN'), ...commonDetails, batches: window.extractedData.batches });
                showToast("🚀 Data PC me save ho gaya!", "success");
            } catch(e) { alert("Cloud me save karne me error aaya."); }
        }

        window.downloadMultipleFromHistory = function(targetCategory) {
            const checkboxes = document.querySelectorAll('.grn-checkbox:checked');
            if(checkboxes.length === 0) return alert("Pehle list me se kuch GRN select karein (Tick mark lagayein)!");
            const templateDataUrl = window.templates[targetCategory];
            if(!templateDataUrl) return alert(`🚨 Pehle Settings me jaakar ${targetCategory} ka Word Template upload karein!`);
            let allCombinedBatches = [];
            checkboxes.forEach(cb => {
                const recordId = cb.value; const record = window.historyData.find(r => r.id === recordId);
                if(record) {
                    const filteredBatches = record.batches.filter(b => b.category === targetCategory);
                    const enrichedBatches = filteredBatches.map(b => ({ ...b, qty: targetCategory === 'Inner' ? b.qty + " Nos" : b.qty, supplier: record.supplier || "", approval_no: record.approvalNo || "", grn: record.grnNo || "", dc_no: record.dcNo || "", dc_date: record.dcDate || "" }));
                    allCombinedBatches = allCombinedBatches.concat(enrichedBatches);
                }
            });
            if(allCombinedBatches.length === 0) return alert(`Select kiye gaye GRNs me koi item '${targetCategory}' nahi hai.`);
            let ZipConstructor = (typeof window.PizZip !== 'undefined') ? window.PizZip : PizZip;
            try {
                const base64Data = templateDataUrl.split(',')[1]; const zip = new ZipConstructor(base64Data, { base64: true }); const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                doc.render({ batches: allCombinedBatches }); const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                let fileName = `QC_${targetCategory}_Merged_${checkboxes.length}_GRNs.docx`; window.saveAs(out, fileName); showToast(`${targetCategory} Merged File Downloaded!`, "success");
            } catch(error) { alert("🚨 WORD TEMPLATE ERROR 🚨\nMS Word me khol kar 'Save As -> .docx' karein."); }
        }

        function fetchWorkbook() {
            if (!currentUser) return;
            const q = query(collection(db, 'users', currentUser.uid, 'qc_word_history_master'), orderBy("timestamp", "desc"));
            unsubHistory = onSnapshot(q, (snap) => {
                let data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() })); window.historyData = data; renderWorkbook();
            });
        }

        function renderWorkbook() {
            const container = document.getElementById('workbookContainer');
            if(window.historyData.length === 0) return container.innerHTML = '<div class="text-center py-10 text-gray-500 font-bold">Waiting for scans from phone...</div>';
            container.innerHTML = '';
            window.historyData.forEach(record => {
                const isExpanded = window.expandedGrnId === record.id;
                let html = `
                <div class="border-2 border-gray-200 rounded-xl shadow-md bg-white mb-6 overflow-hidden">
                    <div class="bg-gray-50 p-5 cursor-pointer flex justify-between items-center transition hover:bg-gray-100" onclick="toggleExpand('${record.id}')">
                        <div class="flex items-center gap-4">
                            <input type="checkbox" class="grn-checkbox w-6 h-6 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer" value="${record.id}" onclick="event.stopPropagation()">
                            <div>
                                <div class="text-xl font-black text-gray-900">📄 GRN No: ${record.grnNo}</div>
                                <div class="text-sm font-bold text-gray-600 mt-1">Supplier: ${record.supplier} | Batches: <span class="bg-gray-200 text-gray-800 px-2 py-0.5 rounded-full text-xs">${record.batches?.length || 0}</span> | Date: ${record.dateStr}</div>
                            </div>
                        </div>
                        <div class="flex gap-4 items-center">
                            <span class="text-gray-500 text-xl font-bold">${isExpanded ? '▲' : '▼'}</span>
                            <button onclick="event.stopPropagation(); deleteRecord('${record.id}')" class="text-white bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded-lg font-bold shadow transition text-xs">Delete</button>
                        </div>
                    </div>`;
                if(isExpanded) {
                    html += `<div class="p-6 bg-white border-t-2 border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-6">`;
                    record.batches.forEach((b, batchIdx) => {
                        let catColor = b.category === 'Inner' ? 'blue' : 'purple';
                        html += `
                        <div class="border rounded-xl bg-white shadow-sm p-4 relative border-t-4 border-${catColor}-500">
                            <h4 class="text-xl font-black text-gray-800 mb-2">${b.brand}</h4>
                            <div class="text-base text-gray-600 font-mono mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                                Batch: <span class="font-bold text-blue-700 text-lg">${b.batch}</span> | Qty: <span class="font-bold text-green-700 text-lg">${b.qty}</span>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
                container.innerHTML += html;
            });
        }
        window.toggleExpand = function(id) { window.expandedGrnId = window.expandedGrnId === id ? null : id; renderWorkbook(); }
        window.deleteRecord = async function(id) { if(confirm("Are you sure you want to delete this GRN?")) await deleteDoc(doc(db, 'users', currentUser.uid, 'qc_word_history_master', id)); }
    </script>
