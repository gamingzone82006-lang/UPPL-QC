<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPPL QC Command Center</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        input[type="file"], input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px;}
        button:hover { background-color: #218838; }
        .btn-copy { background-color: #007bff; width: auto; margin-top: 0;}
        .btn-copy:hover { background-color: #0069d9; }
        .form-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px;}
        .form-row input { margin: 0; }
        #loader { display: none; text-align: center; color: #ff9800; font-weight: bold; margin-top: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>UPPL QC Command Center</h2>

    <div class="section">
        <h3>1. Setup & API</h3>
        <input type="password" id="apiKey" placeholder="Apna Gemini API Key yahan dalein">
    </div>

    <div class="section">
        <h3>2. Upload & Scan Report</h3>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="processImage()">Scan Image (0 extra Bill Mode)</button>
        <div id="loader">Gemini 1.5 Flash Scanning... Please wait...</div>
    </div>

    <div class="section">
        <h3>3. QC Extracted Data & Calculation</h3>
        
        <label>Supplier Name:</label>
        <input type="text" id="supplierName" readonly>

        <label>Approval Number:</label>
        <input type="text" id="approvalNumber" readonly>

        <label>Total Quantity:</label>
        <input type="text" id="totalQuantity" oninput="calculateQC()" placeholder="Enter Total Qty">

        <label>Sample Size (Scanned):</label>
        <div class="form-row">
            <input type="text" id="sampleSize" readonly>
            <button class="btn-copy" onclick="copySampleSize()">Copy Sample Size</button>
        </div>

        <label>Acceptable Defect Limit (JS Calculation):</label>
        <input type="text" id="defectLimit" readonly placeholder="Auto calculated based on sample size">
    </div>
</div>

<script>
    // ==========================================
    // 1. RULES & TRAINING (Isme naye rules add karte jao)
    // ==========================================
    const qcRules = `
    Tum ek strict Quality Control data extractor ho. 
    Rules:
    1. Photo padho aur exact data nikal kar sirf ek JSON object return karo. 
    2. JSON keys yeh honi chahiye: "supplierName", "approvalNumber", "sampleSize", "totalQuantity".
    3. Agar photo mein supplier 'ABC' hai, toh approvalNumber '101' do.
    4. Koi faltu text ya markdown (like \`\`\`json) mat dena, sirf raw JSON dena.
    5. Agar koi data na mile toh value mein "Not Found" likhna.
    `;

    // ==========================================
    // 2. IMAGE TO BASE64 CONVERTER
    // ==========================================
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]); // Sirf base64 string chahiye
            reader.onerror = error => reject(error);
        });
    }

    // ==========================================
    // 3. MAIN SCAN FUNCTION (Stateless API Call)
    // ==========================================
    async function processImage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const fileInput = document.getElementById('imageInput').files[0];

        if (!apiKey) { alert("Pehle API Key dalo bhai!"); return; }
        if (!fileInput) { alert("Photo toh upload karo pehle!"); return; }

        document.getElementById('loader').style.display = 'block';

        try {
            const base64Image = await fileToBase64(fileInput);
            
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                system_instruction: { parts: [{ text: qcRules }] },
                contents: [
                    {
                        role: "user",
                        parts: [
                            { text: "Extract data as per rules and give JSON only." },
                            { inline_data: { mime_type: fileInput.type, data: base64Image } }
                        ]
                    }
                ],
                generationConfig: { temperature: 0.1 } // Low temperature for 0 bugs
            };

            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            document.getElementById('loader').style.display = 'none';

            if (result.error) {
                alert("API Error: " + result.error.message);
                return;
            }

            // Extract text aur JSON parse karna
            let rawText = result.candidates[0].content.parts[0].text.trim();
            // Agar Gemini galti se markdown bhej de, toh usko hatane ka jugaad
            rawText = rawText.replace(/```json/g, "").replace(/```/g, ""); 
            
            const extractedData = JSON.parse(rawText);

            // Form ko auto-fill karna
            document.getElementById('supplierName').value = extractedData.supplierName || '';
            document.getElementById('approvalNumber').value = extractedData.approvalNumber || '';
            document.getElementById('sampleSize').value = extractedData.sampleSize || '';
            document.getElementById('totalQuantity').value = extractedData.totalQuantity || '';

            // Calculate trigger karna
            calculateQC();

        } catch (error) {
            document.getElementById('loader').style.display = 'none';
            alert("Scan failed. Pura photo clearly visible hona chahiye. Error: " + error.message);
        }
    }

    // ==========================================
    // 4. JAVASCRIPT CALCULATIONS (0 Errors)
    // ==========================================
    function calculateQC() {
        const sampleSize = parseFloat(document.getElementById('sampleSize').value) || 0;
        
        // Example Rule: Acceptable defect is 5% of Sample Size
        if (sampleSize > 0) {
            const defectLimit = (sampleSize * 0.05).toFixed(2);
            document.getElementById('defectLimit').value = defectLimit + " units";
        } else {
            document.getElementById('defectLimit').value = "";
        }
    }

    // ==========================================
    // 5. COPY SAMPLE SIZE FEATURE
    // ==========================================
    function copySampleSize() {
        const sampleSizeValue = document.getElementById('sampleSize').value;
        if (!sampleSizeValue || sampleSizeValue === "Not Found") {
            alert("Copy karne ke liye koi valid Sample Size nahi hai!");
            return;
        }

        // Copy to clipboard
        navigator.clipboard.writeText(sampleSizeValue).then(() => {
            alert("Sample Size '" + sampleSizeValue + "' copy ho gaya!");
        }).catch(err => {
            alert("Copy fail ho gaya: " + err);
        });
    }
</script>

</body>
</html>
